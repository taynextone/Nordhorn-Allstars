const ObjectiveTracker = {
  getNextTrainer() {
    return trainers.find(t => !t.beaten) || null;
  },

  getDistanceTo(trainer) {
    if (!trainer) return 0;
    return Math.abs(player.x - trainer.x) + Math.abs(player.y - trainer.y);
  },

  getArrowTo(trainer) {
    if (!trainer) return '✓';
    const dx = trainer.x - player.x;
    const dy = trainer.y - player.y;
    if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) return '!';
    if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? '→' : '←';
    return dy > 0 ? '↓' : '↑';
  },

  drawWorldMarker(camX, camY) {
    const next = this.getNextTrainer();
    if (!next) return;
    const px = (next.x - camX) * TILE;
    const py = (next.y - camY) * TILE;
    if (px < -TILE || px > VIEW_W || py < -TILE || py > VIEW_H) return;
    // Slower 700 ms pulse so the marker reads as a stable beacon rather than a
    // flicker. The diamond shape plus small shadow keeps it visible on all tiles.
    const pulse = Math.floor(Date.now() / 700) % 2;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#d4600a';
    ctx.fillText('◆', px + 9, py - 11);
    ctx.fillStyle = pulse ? '#ffffff' : '#ffcc80';
    ctx.fillText('◆', px + 8, py - 12);
    ctx.textAlign = 'left';
  },

  drawMinimapMarker() {
    const next = this.getNextTrainer();
    if (!next) return;
    const mx = MINIMAP_X + next.x * MINIMAP_SCALE;
    const my = MINIMAP_Y + next.y * MINIMAP_SCALE;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx - 3, my - 3, 7, 7);
    ctx.beginPath();
    ctx.moveTo(MINIMAP_X + player.x * MINIMAP_SCALE, MINIMAP_Y + player.y * MINIMAP_SCALE);
    ctx.lineTo(mx, my);
    ctx.stroke();
  },

  drawOverviewTargets(mapX, mapY, scale) {
    // Separate overview-map wayfinding only: tiny trainer dots on the map screen,
    // not another overworld/battle HUD layer. This keeps the main playfield clean
    // while making the optional O-map useful during full-route playtests.
    const next = this.getNextTrainer();
    trainers.forEach(t => {
      const tx = mapX + t.x * scale;
      const ty = mapY + t.y * scale;
      ctx.fillStyle = t.beaten ? C.MID : C.DARKEST;
      ctx.fillRect(tx - 3, ty - 3, 7, 7);
      ctx.fillStyle = t.beaten ? C.LIGHT : '#d4600a';
      ctx.fillRect(tx - 1, ty - 1, 3, 3);
    });
    if (next) {
      const nx = mapX + next.x * scale;
      const ny = mapY + next.y * scale;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.strokeRect(nx - 5, ny - 5, 11, 11);
      ctx.fillStyle = C.DARKEST;
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('NEXT', nx, ny - 9);
      ctx.textAlign = 'left';
    }
  }
};

function drawOverworld() {
  const camX = Math.max(0, Math.min(MAP_W - VIEW_TILES_W / 1, player.x - Math.floor(VIEW_TILES_W / 2)));
  const camY = Math.max(0, Math.min(MAP_H - VIEW_TILES_H / 1, player.y - Math.floor(VIEW_TILES_H / 2)));

  // Draw tiles
  for (let y = Math.floor(camY) - 1; y < Math.ceil(camY) + VIEW_TILES_H + 1; y++) {
    for (let x = Math.floor(camX) - 1; x < Math.ceil(camX) + VIEW_TILES_W + 1; x++) {
      if (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) {
        drawTile(x, y, worldMap[y][x], camX, camY);
      }
    }
  }

  // Draw trainers
  trainers.forEach(t => {
    if (!t.beaten) drawTrainerSprite(t, camX, camY);
    else {
      // Draw beaten trainer faded
      const px = (t.x - camX) * TILE;
      const py = (t.y - camY) * TILE;
      ctx.globalAlpha = 0.5;
      drawTrainerSprite(t, camX, camY);
      ctx.globalAlpha = 1;
    }
  });

  // Draw player
  drawPlayer(camX, camY, player.facing, Math.floor(frameCount / 15) % 2);

  // Draw one small objective marker above the current trainer target.
  ObjectiveTracker.drawWorldMarker(camX, camY);

  // Draw optional home-court NPC (kid apprentice) on top of tiles but below minimap/HUD.
  drawHomeCourtKid(camX, camY);

  // Draw Lingen harbor worker NPC on top of tiles but below minimap/HUD.
  drawHarborWorker(camX, camY);

  // Draw Lingen arena fan NPC at the arena entrance, below minimap/HUD.
  drawLingenArenaFan(camX, camY);

  // Draw school-yard student NPC near the school/gym hub, below minimap/HUD.
  drawSchoolYardStudent(camX, camY);

  // Draw Zentrum reporter NPC on the market square, below minimap/HUD.
  drawZentrumReporter(camX, camY);

  // Draw minimap
  if (minimapVisible) drawMinimap();

  // Draw minimap/overview hint. M stays tiny map; O opens a separate overview screen.
  ctx.font = '6px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = C.DARK;
  ctx.fillText('M: Mini  O: Overview', VIEW_W - 10, VIEW_H - 6);
  ctx.textAlign = 'left';

  // Minimal Gameboy HUD — keep the playfield clean.
  drawCleanOverworldHUD();
}

// ZENTRUM REPORTER — progress-aware NPC on the Nordhorn market square.
// A local reporter who covers the Nordhorn-vs-Lingen arc, giving the player
// a sense that the whole town is following the road-trip. Uses existing
// drawHoopsterSprite and startDialog; placed on a walkable tile at x=35, y=18
// so he is part of the central hub content, not a HUD overlay.
// ============================================================
const ZentrumReporter = {
  x: 35,
  y: 18,
  facing: 'down',

  isPlayerAdjacent() {
    if (!player) return false;
    return Math.abs(player.x - this.x) + Math.abs(player.y - this.y) === 1;
  },

  isFacingPlayer() {
    if (!player || !this.isPlayerAdjacent()) return false;
    if (player.facing === 'left' && this.x === player.x - 1 && this.y === player.y) return true;
    if (player.facing === 'right' && this.x === player.x + 1 && this.y === player.y) return true;
    if (player.facing === 'up' && this.y === player.y - 1 && this.x === player.x) return true;
    if (player.facing === 'down' && this.y === player.y + 1 && this.x === player.x) return true;
    return false;
  },

  getDialog() {
    const beaten = name => {
      const t = trainers.find(tr => tr.name === name);
      return !!(t && t.beaten);
    };

    if (beaten('Coach Mihler')) {
      return ['Zentrum-Reporter', 'Acht Siege! Meine Schlagzeile steht: Nordhorn spielt Lingen still. Passen, Pausen, Wurf um Wurf — das ist der Artikel, den ich morgen in die Stadtzeitung setze.'];
    }
    if (beaten('Maxim')) {
      return ['Zentrum-Reporter', 'Arena Lingen ist gefallen. Die Gold-Tribuene schwieg, als du Maxim trafst. Nur noch die Halle trennt dich vom Titel.'];
    }
    if (beaten('Rashta')) {
      return ['Zentrum-Reporter', 'Der Hafenwind hat Nordhorn gebliesen. Zwei Auswaerts-Courts gehören uns. Der Reporter aus Lingen grübelt schon.'];
    }
    if (beaten('Sven')) {
      return ['Zentrum-Reporter', 'Bahnhof Lingen erobert. Mein erster Absatz: Der Nordhorn-Kid schiebt die Grenze zurück. Rashta am Hafen ist dran.'];
    }
    if (beaten('Sophie')) {
      return ['Zentrum-Reporter', 'Spielplatz durch, Nerven bewiesen. Das Zentrum rät: Die Lingen-Route beginnt am Bahnhof. Ich werde dort am Zaun stehen.'];
    }
    if (beaten('Markus')) {
      return ['Zentrum-Reporter', 'Markus’ Defense geknackt. Sophie am Spielplatz wird der naechste Artikel. Danach schreibt Lingen über dich.'];
    }
    if (beaten('Anna')) {
      return ['Zentrum-Reporter', 'Park-Court gewonnen! Anna bestätigt: dein Wurf sitzt. Ich tippe schon die Markus-Schulhof-Überschrift.'];
    }
    return ['Zentrum-Reporter', 'Hier ist das Zentrum. Ich berichte, sobald der erste Heim-Court fällt. Klaus beim Wohnhof ist dein erster Satz.'];
  },

  tryInteract() {
    if (this.isFacingPlayer()) {
      startDialog(...this.getDialog());
      return true;
    }
    return false;
  },

  render(camX, camY) {
    const px = (this.x - camX) * TILE;
    const py = (this.y - camY) * TILE;
    if (px < -TILE || px > VIEW_W || py < -TILE || py > VIEW_H) return;
    drawHoopsterSprite(px, py - 2, {
      scale: 1,
      facing: this.facing,
      jersey: '#5a4a3a',
      trim: '#e8d8a8',
      hair: '#c8b898',
      pants: '#2a3030',
      number: 'R',
      ball: false,
      pose: 'idle',
      headband: null,
      accessory: 'coach'
    });
    if (this.isPlayerAdjacent()) {
      const bob = Math.sin(Date.now() / 250) * 1;
      ctx.fillStyle = C.DARKEST;
      ctx.fillRect(px + 8, py - 10 + bob, 4, 4);
      ctx.fillRect(px + 6, py - 12 + bob, 8, 2);
    }
  }
};

// ============================================================
// MINIMAP
// ============================================================

const MINIMAP_SCALE = 2; // pixels per tile
const MINIMAP_W = MAP_W * MINIMAP_SCALE; // 140
const MINIMAP_H = MAP_H * MINIMAP_SCALE; // 120
const MINIMAP_X = VIEW_W - MINIMAP_W - 8;
const MINIMAP_Y = 8;
const MINIMAP_BG = 'rgba(15, 56, 15, 0.85)';

// Tile colors for minimap (simplified)
const MINIMAP_COLORS = {
  [T.GRASS]: '#9bbc0f',
  [T.PATH]: '#8bac0f',
  [T.WATER]: '#306230',
  [T.TREE]: '#306230',
  [T.BUILD]: '#4a4a4a',
  [T.ROOF]: '#2a2a2a',
  [T.FENCE]: '#6b6b6b',
  [T.COURT]: '#5a5a3a',
  [T.GOLDCOURT]: '#8a7a3a',
  [T.DOOR]: '#0f380f',
  [T.FLOWER]: '#9bbc0f',
  [T.BENCH]: '#6b5b3b',
  [T.BRIDGE]: '#5a4a2a',
  [T.STADIUM]: '#4a4a4a',
  [T.WALL]: '#3a3a3a',
  [T.SIGN]: '#ddaa22',
};

const MinimapCache = {
  canvas: null,
  ctx: null,
  dirty: true,

  ensure() {
    if (!this.canvas) {
      this.canvas = document.createElement('canvas');
      this.canvas.width = MINIMAP_W;
      this.canvas.height = MINIMAP_H;
      this.ctx = this.canvas.getContext('2d');
      this.ctx.imageSmoothingEnabled = false;
      this.dirty = true;
    }
    if (this.dirty) this.rebuild();
    return this.canvas;
  },

  rebuild() {
    if (!this.ctx) return;
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const tile = worldMap[y][x];
        this.ctx.fillStyle = MINIMAP_COLORS[tile] || C.LIGHT;
        this.ctx.fillRect(
          x * MINIMAP_SCALE,
          y * MINIMAP_SCALE,
          MINIMAP_SCALE,
          MINIMAP_SCALE
        );
      }
    }
    this.dirty = false;
  }
};

function drawMinimap() {
  // Border
  ctx.fillStyle = C.DARK;
  ctx.fillRect(MINIMAP_X - 2, MINIMAP_Y - 2, MINIMAP_W + 4, MINIMAP_H + 4);
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(MINIMAP_X - 1, MINIMAP_Y - 1, MINIMAP_W + 2, MINIMAP_H + 2);

  // Static tile layer is cached: 4,200 tiny fills become one drawImage per frame.
  ctx.globalAlpha = 0.92;
  ctx.drawImage(MinimapCache.ensure(), MINIMAP_X, MINIMAP_Y);
  ctx.globalAlpha = 1;

  // Draw trainers on minimap (as red dots)
  trainers.forEach(t => {
    const mx = MINIMAP_X + t.x * MINIMAP_SCALE;
    const my = MINIMAP_Y + t.y * MINIMAP_SCALE;
    ctx.fillStyle = t.beaten ? C.MID : '#ff4444';
    ctx.fillRect(mx - 1, my - 1, 3, 3);
  });

  // Highlight the next undefeated trainer so the core loop always has direction.
  ObjectiveTracker.drawMinimapMarker();

  // Draw player on minimmap (blinking white dot)
  const blink = Math.floor(Date.now() / 300) % 2;
  const px = MINIMAP_X + player.x * MINIMAP_SCALE;
  const py = MINIMAP_Y + player.y * MINIMAP_SCALE;
  ctx.fillStyle = blink ? '#ffffff' : C.DARK;
  ctx.fillRect(px - 1, py - 1, 3, 3);

  // Label
  ctx.fillStyle = C.DARKEST;
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MAP', MINIMAP_X + MINIMAP_W / 2, MINIMAP_Y + MINIMAP_H + 8);
  ctx.textAlign = 'left';
}

function drawOverviewMap() {
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  ctx.fillStyle = C.DARKEST;
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NORDHORN OVERVIEW', VIEW_W / 2, 24);

  const scale = 5;
  const mapW = MAP_W * scale;
  const mapH = MAP_H * scale;
  const mapX = Math.floor((VIEW_W - mapW) / 2);
  const mapY = 42;

  ctx.fillStyle = C.DARKEST;
  ctx.fillRect(mapX - 4, mapY - 4, mapW + 8, mapH + 8);
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(mapX - 2, mapY - 2, mapW + 4, mapH + 4);

  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const tile = worldMap[y][x];
      ctx.fillStyle = MINIMAP_COLORS[tile] || C.LIGHT;
      ctx.fillRect(mapX + x * scale, mapY + y * scale, scale, scale);
    }
  }

  MAP_LANDMARKS.forEach(mark => {
    const mx = mapX + mark.x * scale;
    const my = mapY + mark.y * scale;
    ctx.fillStyle = mark.kind === 'route' ? C.DARK : C.DARKEST;
    ctx.fillRect(mx - 2, my - 2, 5, 5);
    ctx.font = '6px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(mark.label, mx + 5, my + 2);
  });

  ObjectiveTracker.drawOverviewTargets(mapX, mapY, scale);

  const px = mapX + player.x * scale;
  const py = mapY + player.y * scale;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(px - 2, py - 2, 5, 5);
  ctx.fillStyle = C.DARKEST;
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('YOU', px, py - 6);

  ctx.font = '8px monospace';
  ctx.fillText('O / ESC / A/B/ENTER: BACK', VIEW_W / 2, VIEW_H - 18);
  ctx.textAlign = 'left';
}

function isWalkable(x, y) {
  if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return false;
  const t = worldMap[y][x];
  return t === T.GRASS || t === T.PATH || t === T.COURT || t === T.GOLDCOURT || t === T.FLOWER || t === T.BRIDGE || t === T.DOOR;
}

function getAdjacentStorySign() {
  if (!player || !Array.isArray(StorySigns)) return null;
  const front = { x: player.x, y: player.y };
  if (player.facing === 'left') front.x -= 1;
  else if (player.facing === 'right') front.x += 1;
  else if (player.facing === 'up') front.y -= 1;
  else front.y += 1;
  return StorySigns.find(sign => sign.x === front.x && sign.y === front.y) ||
    StorySigns.find(sign => Math.abs(player.x - sign.x) + Math.abs(player.y - sign.y) === 1) || null;
}

function tryStorySignInteraction() {
  const sign = getAdjacentStorySign();
  if (!sign) return false;
  const body = typeof sign.getBody === 'function' ? sign.getBody() : sign.body;
  startDialog(sign.title, body);
  return true;
}

let minimapVisible = false;

function updateOverworld() {
  let dx = 0, dy = 0;
  player.moving = false;

  // Toggle minimap / full overview map
  if (wasPressed('m') || wasPressed('M')) { minimapVisible = !minimapVisible; }
  if (wasPressed('o') || wasPressed('O')) { gameState = 'OVERVIEW'; clearPressedInput(); return; }
  if (wasConfirmPressed()) {
    if (tryStorySignInteraction()) return;
    if (HomeCourtKid.tryInteract()) return;
    if (ZentrumReporter.tryInteract()) return;
    if (HarborWorker.tryInteract()) return;
    if (LingenArenaFan.tryInteract()) return;
    if (SchoolYardStudent.tryInteract()) return;
  }
  if (wasPressed('r') || wasPressed('R')) {
    if (HomeRest.rest()) {
      // Rest feedback opens the existing dialog box; stop this overworld frame so
      // a held direction cannot move into a trainer and replace the home dialog
      // with a battle intro. This keeps dialog/state flow deterministic without
      // adding any new HUD or overlay chrome.
      clearPressedInput();
      return;
    }
  }

  if (keysPressed['ArrowLeft'] || keys['ArrowLeft']) { dx = -1; player.facing = 'left'; player.moving = true; }
  else if (keysPressed['ArrowRight'] || keys['ArrowRight']) { dx = 1; player.facing = 'right'; player.moving = true; }
  else if (keysPressed['ArrowUp'] || keys['ArrowUp']) { dy = -1; player.facing = 'up'; player.moving = true; }
  else if (keysPressed['ArrowDown'] || keys['ArrowDown']) { dy = 1; player.facing = 'down'; player.moving = true; }

  // Movement with frame-based timing
  if (frameCount % 6 === 0) {
    if (dx !== 0 || dy !== 0) {
      const nx = player.x + dx;
      const ny = player.y + dy;
      if (isWalkable(nx, ny)) {
        player.x = nx;
        player.y = ny;
        keysPressed['ArrowLeft'] = false;
        keysPressed['ArrowRight'] = false;
        keysPressed['ArrowUp'] = false;
        keysPressed['ArrowDown'] = false;

        // Check trainer encounter
        checkTrainerEncounter();
      }
    }
  }

  // Clear pressed keys each frame
  if (frameCount % 6 === 0) {
    keysPressed['ArrowLeft'] = false;
    keysPressed['ArrowRight'] = false;
    keysPressed['ArrowUp'] = false;
    keysPressed['ArrowDown'] = false;
  }
}

function checkTrainerEncounter() {
  for (let t of trainers) {
    if (!t.beaten && Math.abs(player.x - t.x) < 2 && Math.abs(player.y - t.y) < 2) {
      // Face the trainer
      if (player.x < t.x) player.facing = 'right';
      else if (player.x > t.x) player.facing = 'left';
      else if (player.y < t.y) player.facing = 'down';
      else player.facing = 'up';

      startDialog(t.dialogue, '', () => startBattle(t));
      gameState = 'DIALOG';
      return;
    }
  }
}

function drawBattle() {
  // Background - court
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // Court floor
  ctx.fillStyle = '#5a5a3a';
  ctx.fillRect(20, 20, VIEW_W - 40, VIEW_H - 100);

  // Court lines
  ctx.fillStyle = C.DARK;
  ctx.fillRect(20, 20, VIEW_W - 40, 2);
  ctx.fillRect(20, VIEW_H - 82, VIEW_W - 40, 2);
  ctx.fillRect(20, 20, 2, VIEW_H - 102);
  ctx.fillRect(VIEW_W - 22, 20, 2, VIEW_H - 102);

  // Half court line
  ctx.fillRect(VIEW_W / 2, 20, 2, VIEW_H - 102);

  // Classic court markings only: center circle and painted keys give the
  // battle floor more structure without adding any coach/advisor overlays.
  ctx.strokeStyle = C.DARK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(VIEW_W / 2, 120, 28, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeRect(20, 82, 58, 76);
  ctx.strokeRect(VIEW_W - 78, 82, 58, 76);
  ctx.beginPath();
  ctx.arc(78, 120, 18, -Math.PI / 2, Math.PI / 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(VIEW_W - 78, 120, 18, Math.PI / 2, Math.PI * 1.5);
  ctx.stroke();

  // Three point arc
  ctx.fillRect(20, 60, 60, 2);
  ctx.fillRect(20, VIEW_H - 140, 60, 2);
  ctx.fillRect(VIEW_W - 80, 60, 60, 2);
  ctx.fillRect(VIEW_W - 80, VIEW_H - 140, 60, 2);

  // Pixel hoops/backboards are part of the court art, not extra HUD chrome.
  drawBattleHoop(28, 68, 'left');
  drawBattleHoop(VIEW_W - 44, 68, 'right');

  // Scoreboard — compact core UI only: names, target score and current points.
  // The taller box keeps numbers readable without adding coach/advisor chrome.
  ctx.fillStyle = C.DARK;
  ctx.fillRect(128, 18, 224, 40);
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(130, 20, 220, 36);
  ctx.fillStyle = C.DARKEST;

  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  const enemyScoreName = shortenBattleLabel(battle.currentTrainer.name, 12);
  ctx.fillText(enemyScoreName, 184, 33);
  ctx.fillText('YOU', 296, 33);
  ctx.font = '12px monospace';
  ctx.fillText(String(battle.enemyScore), 184, 50);
  ctx.fillText(String(battle.playerScore), 296, 50);
  ctx.font = '7px monospace';
  ctx.fillText('FIRST ' + battle.currentTrainer.ptsToWin, 240, 46);
  ctx.fillStyle = C.DARK;
  ctx.fillRect(236, 26, 2, 26);
  ctx.fillRect(242, 26, 2, 26);

  // Extra overlays intentionally disabled: the battle screen stays classic and readable.

  // Player side — fully above the command menu so the sprite, ball and label stay visible.
  drawBattlePlayer(76, 145);

  // Enemy side
  drawBattleEnemy(320, 80);

  // Ball
  if (battle.hasBall) {
    ctx.fillStyle = '#d4600a';
    ctx.beginPath();
    ctx.arc(104, 191, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else {
    ctx.fillStyle = '#d4600a';
    ctx.beginPath();
    ctx.arc(340, 100, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // HUD
  drawBattleHUD();

  // Dialog/messages
  drawDialog();

  // Move selection
  if (battle.phase === 'select' && battle.playerTurn) {
    drawMoveSelect();
  }

  ctx.textAlign = 'left';
}

function drawBattleHoop(x, y, side) {

  ctx.fillRect(poleX, y - 8, 4, 42);
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(x, y, 18, 24);
  ctx.fillStyle = C.DARK;
  ctx.fillRect(x, y, 18, 3);
  ctx.fillRect(x, y + 21, 18, 3);
  ctx.fillRect(x, y, 3, 24);
  ctx.fillRect(x + 15, y, 3, 24);

  // Rim and tiny net pixels; no labels/meters, just readable basketball scenery.
  ctx.fillStyle = '#d4600a';
  ctx.fillRect(rimX, y + 10, 10, 4);
  ctx.fillStyle = C.MID;
  ctx.fillRect(rimX + 1, y + 15, 2, 8);
  ctx.fillRect(rimX + 5, y + 15, 2, 8);

function drawBattleHUD() {
  // Three compact non-overlapping boxes: player, message, enemy.
  // This keeps the battle readable without reintroducing coach/advisor overlays.
  const boxY = VIEW_H - 76;
  const boxH = 72;
  const playerBox = { x: 4, y: boxY, w: 188, h: boxH };
  const msgBox = { x: 196, y: boxY, w: 88, h: boxH };
  const enemyBox = { x: VIEW_W - 192, y: boxY, w: 188, h: boxH };
  const clampBarWidth = (value, max, width) => {
    const safeMax = Math.max(1, Number(max) || 1);
    const ratio = Math.max(0, Math.min(1, (Number(value) || 0) / safeMax));
    return Math.floor(ratio * width);
  };

  function drawPanelBox(box) {
    ctx.fillStyle = C.DARK;
    ctx.fillRect(box.x, box.y, box.w, box.h);
    ctx.fillStyle = C.MID;
    ctx.fillRect(box.x + 1, box.y + 1, box.w - 2, box.h - 2);
    ctx.fillStyle = C.DARKEST;
    ctx.fillRect(box.x + 2, box.y + 2, box.w - 4, box.h - 4);
    ctx.fillStyle = C.LIGHT;
    ctx.fillRect(box.x + 4, box.y + 4, box.w - 8, box.h - 8);
  }

  drawPanelBox(playerBox);
  ctx.fillStyle = C.DARKEST;
  ctx.font = '8px monospace';
  ctx.fillText('LV ' + player.level, playerBox.x + 10, VIEW_H - 60);
  ctx.font = '7px monospace';
  ctx.fillText('REG +' + PLAYER_ENERGY_REGEN, playerBox.x + 146, VIEW_H - 52);

  // HP bar
  ctx.fillStyle = C.DARK;
  ctx.fillRect(playerBox.x + 56, VIEW_H - 64, 92, 8);
  const hpWidth = clampBarWidth(battle.playerHp, player.maxHp, 88);
  ctx.fillStyle = hpWidth > 30 ? C.DARK : (hpWidth > 15 ? '#d4600a' : '#ff0000');
  ctx.fillRect(playerBox.x + 58, VIEW_H - 62, hpWidth, 4);
  ctx.fillStyle = C.DARKEST;
  ctx.fillText('HP ' + Math.max(0, battle.playerHp) + '/' + player.maxHp, playerBox.x + 10, VIEW_H - 68);

  // Energy bar
  ctx.fillStyle = C.DARK;
  ctx.fillRect(playerBox.x + 56, VIEW_H - 48, 92, 8);
  const enWidth = clampBarWidth(battle.playerEnergy, player.maxEnergy, 88);
  ctx.fillStyle = '#2a5a9a';
  ctx.fillRect(playerBox.x + 58, VIEW_H - 46, enWidth, 4);
  ctx.fillStyle = C.DARKEST;
  ctx.fillText('EN ' + battle.playerEnergy + '/' + player.maxEnergy, playerBox.x + 10, VIEW_H - 52);

  drawPanelBox(enemyBox);
  ctx.fillStyle = C.DARKEST;
  ctx.font = '8px monospace';
  ctx.fillText(shortenBattleLabel(battle.currentTrainer.name, 12), enemyBox.x + 8, VIEW_H - 60);

  ctx.fillStyle = C.DARK;
  ctx.fillRect(enemyBox.x + 56, VIEW_H - 64, 92, 8);
  const eHpWidth = clampBarWidth(battle.enemyHp, battle.currentTrainer.playerHp, 88);
  ctx.fillStyle = eHpWidth > 30 ? C.DARK : (eHpWidth > 15 ? '#d4600a' : '#ff0000');
  ctx.fillRect(enemyBox.x + 58, VIEW_H - 62, eHpWidth, 4);
  ctx.fillStyle = C.DARKEST;
  ctx.fillText('HP ' + Math.max(0, battle.enemyHp), enemyBox.x + 8, VIEW_H - 68);

  ctx.fillStyle = C.DARK;
  ctx.fillRect(enemyBox.x + 56, VIEW_H - 48, 92, 8);
  const eEnWidth = clampBarWidth(battle.enemyEnergy, battle.enemyMaxEnergy, 88);
  ctx.fillStyle = '#2a5a9a';
  ctx.fillRect(enemyBox.x + 58, VIEW_H - 46, eEnWidth, 4);
  ctx.fillStyle = C.DARKEST;
  ctx.fillText('EN ' + battle.enemyEnergy + '/' + battle.enemyMaxEnergy, enemyBox.x + 8, VIEW_H - 52);
  ctx.font = '7px monospace';
  ctx.fillText((battle.currentTrainer.aiStyle || 'Trainer') + '  Ziel ' + battle.currentTrainer.ptsToWin, enemyBox.x + 8, VIEW_H - 34);

  // Message area — centered between HP boxes, no overlap.
  if (battle.message && (battle.phase !== 'select' || battle.feedbackTimer > 0)) {
    drawPanelBox(msgBox);
    ctx.fillStyle = C.DARKEST;
    ctx.font = '7px monospace';

    const drawWrappedBattleText = (text, startY, maxLines) => {
      let lineY = startY;
      getCompactBattleTextLines(text, 13, maxLines).forEach(line => {
        ctx.fillText(line, msgBox.x + 8, lineY);
        lineY += 9;
      });
      return lineY;
    };

    const nextLineY = drawWrappedBattleText(battle.message, VIEW_H - 60, 3);
    if (battle.subMessage) {
      ctx.font = '6px monospace';
      ctx.fillStyle = C.DARK;
      drawWrappedBattleText(battle.subMessage, Math.min(nextLineY + 2, VIEW_H - 32), 2);
    }
  }
}

function drawMoveSelect() {
  // Move selection menu: keep the whole command box above the bottom HP/EN HUD.
  const menuX = 20;
  const menuY = VIEW_H - 150;
  const menuW = 200;
  const menuH = 68;

  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(menuX, menuY, menuW, menuH);
  ctx.fillStyle = C.DARK;
  ctx.fillRect(menuX + 2, menuY + 2, menuW - 4, menuH - 4);
  ctx.fillStyle = C.DARKEST;
  ctx.fillRect(menuX + 4, menuY + 4, menuW - 8, menuH - 8);
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(menuX + 6, menuY + 6, menuW - 12, menuH - 12);

  ctx.fillStyle = C.DARKEST;
  ctx.font = '8px monospace';

  const moves = battle.playerMoves;
  const maxDisplay = 3;
  const startIdx = Math.max(0, battle.selectedMove - maxDisplay + 1);

  for (let i = startIdx; i < Math.min(moves.length, startIdx + maxDisplay); i++) {
    const idx = i - startIdx;
    const move = moves[i];
    const hasEnough = battle.playerEnergy >= (move.energy || 0);

    ctx.fillStyle = hasEnough ? C.DARKEST : C.MID;
    if (i === battle.selectedMove) {
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(menuX + 8, menuY + 8 + idx * 16, menuW - 16, 14);
      ctx.fillStyle = C.DARKEST;
    }

    const prefix = i === battle.selectedMove ? '▶ ' : '  ';
    ctx.fillText(prefix + move.name, menuX + 12, menuY + 19 + idx * 16);
    ctx.fillText('EN: ' + (move.energy || 0), menuX + menuW - 50, menuY + 19 + idx * 16);
  }

  // Tiny in-menu scroll cue: high-level players can have more than three moves,
  // so show position without adding a separate HUD/panel or cluttering the court.
  if (moves.length > maxDisplay) {
    ctx.fillStyle = C.DARK;
    ctx.font = '6px monospace';
    ctx.textAlign = 'right';
    ctx.fillText((battle.selectedMove + 1) + '/' + moves.length, menuX + menuW - 10, menuY + menuH - 8);
    ctx.textAlign = 'left';
  }

  // Move description stays inside the command box, not over the HP/EN panels.
  if (moves[battle.selectedMove]) {
    ctx.fillStyle = C.DARK;
    ctx.font = '6px monospace';
    const desc = String(moves[battle.selectedMove].desc || '');
    const maxDescChars = moves.length > maxDisplay ? 26 : 32;
    const shortDesc = desc.length > maxDescChars ? desc.slice(0, maxDescChars - 3) + '...' : desc;
    ctx.fillText(shortDesc, menuX + 8, menuY + menuH - 8);
  }
}

function updateBattle() {
  if (battle.feedbackTimer > 0) battle.feedbackTimer--;
  if (battle.phase === 'select' && battle.playerTurn) {
    if (wasPressed('ArrowUp')) {
      battle.selectedMove = (battle.selectedMove + battle.playerMoves.length - 1) % battle.playerMoves.length;
    }
    if (wasPressed('ArrowDown')) {
      battle.selectedMove = (battle.selectedMove + 1) % battle.playerMoves.length;
    }
    if (wasConfirmPressed()) {
      executePlayerMove();
    }
  }

  if (battle.phase === 'anim') {
    battle.animTimer--;
    if (battle.animTimer <= 0) {
      // Should be handled by setTimeout
    }
  }
}

// ============================================================
// GAME LOOP
// ============================================================

function gameLoop() {
  ErrorGuard.safe('gameLoop', () => {
    frameCount++;
    ErrorGuard.validateGameState();

    // Clear
    ctx.fillStyle = C.LIGHT;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    // Coach/scout/help overlays stay disabled after the clean-HUD pass.
    // Core controls still work, but the overworld remains map + actors + compact HUD only.
    enforceCleanGameboyUI();

    switch (gameState) {
      case 'TITLE':
        drawTitleScreen();
        if (SaveSystem.hasSave() && (wasPressed('ArrowUp') || wasPressed('ArrowDown'))) {
          titleSelection = titleSelection === 0 ? 1 : 0;
        }
        if (wasConfirmPressed()) {
          if (titleSelection === 1 && SaveSystem.hasSave()) {
            if (!SaveSystem.load()) titleSelection = 0;
          } else {
            SaveSystem.clear();
            gameState = 'CHARSELECT';
            charSelect.phase = 'gender';
            charSelect.gender = 0;
            charSelect.build = 0;
          }
        }
        if (wasCreditsPressed()) {
          gameState = 'CREDITS';
        }
        break;

      case 'CHARSELECT':
        drawCharSelect();
        updateCharSelect();
        break;

      case 'OVERWORLD':
        updateOverworld();
        drawOverworld();
        break;

      case 'OVERVIEW':
        drawOverviewMap();
        if (wasPressed('o') || wasPressed('O') || wasPressed('Escape') || wasConfirmPressed()) {
          gameState = 'OVERWORLD';
          clearPressedInput();
        }
        break;

      case 'DIALOG':
        // Draw underlying overworld
        drawOverworld();
        updateDialog();
        drawDialog();
        break;

      case 'BATTLE':
        updateBattle();
        drawBattle();
        break;

      case 'LOST':
        ctx.fillStyle = C.DARKEST;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
        ctx.fillStyle = C.LIGHT;
        ctx.font = '14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', VIEW_W / 2, VIEW_H / 2 - 20);
        ctx.font = '10px monospace';
        ctx.fillText('You returned home to rest.', VIEW_W / 2, VIEW_H / 2 + 10);
        ctx.fillText('ENTER/SPACE/A/B to continue', VIEW_W / 2, VIEW_H / 2 + 40);
        ctx.textAlign = 'left';
        if (wasConfirmPressed()) {
          player.hp = player.maxHp;
          player.energy = player.maxEnergy;
          movePlayerToHomeGate();
          gameState = 'OVERWORLD';
        }
        break;

      case 'CREDITS':
        drawCredits();
        if (wasConfirmPressed() || wasPressed('Escape')) {
          gameState = 'TITLE';
        }
        break;
    }

    SaveSystem.renderToast();
    // ErrorGuard recoveries stay logged internally only. Do not draw a runtime
    // overlay over Overworld/Battle/Dialog; the post-declutter playfield must
    // remain classic Gameboy UI with only the core HUD/message boxes.
  }, () => {
    ctx.fillStyle = C.DARKEST;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.fillStyle = C.LIGHT;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('RECOVERING...', VIEW_W / 2, VIEW_H / 2);
    gameState = 'TITLE';
  });

  requestAnimationFrame(gameLoop);
}

const DexData = {
  allTrainers: [

    { id: 1, name: 'Anna', build: 'SHOOTER', level: 2, location: 'Nordhorn — Park-Court', badge: 'PARK', badgeColor: '#8bac0f', reward: 'Ruhiger Wurf', flavor: 'Ruhige Haende im gruenen Jersey. Zwischen Vechte-Wind und Asphalt zaehlt Technik.' },
    { id: 2, name: 'Markus', build: 'DEFENDER', level: 3, location: 'Nordhorn — Schulhof-Court', badge: 'SCHULHOF', badgeColor: '#306230', reward: 'Breite Defense', flavor: 'Blaues Trikot, Nummer 33. Wer nach Lingen will, muss erst an seiner Defense vorbei.' },
    { id: 3, name: 'Sophie', build: 'PLAYMAKER', level: 4, location: 'Nordhorn — Spielplatz-Court', badge: 'NERVEN', badgeColor: '#7f4bc1', reward: 'Clutch-Ruhe', flavor: 'Lila Drive, graue Haare, viel Laerm. Sie prueft, ob dein Kopf ruhig bleibt.' },
    { id: 5, name: 'Sven', build: 'DEFENDER', level: 5, location: 'Lingen — Bahnhof-Court', badge: 'GRENZE', badgeColor: '#888899', reward: 'Auswaerts-Haerte', flavor: 'Stahlgraues Jersey und harte Screens. Der erste Lingen-Gegner macht die Grenze eng.' },
    { id: 6, name: 'Rashta', build: 'PLAYMAKER', level: 6, location: 'Lingen — Hafen-Court', badge: 'HAFEN', badgeColor: '#4466aa', reward: 'Wind-Handles', flavor: 'Ball tief, Blick kalt, Emswind im Ruecken. Rashta testet echte Auswaertsruhe.' },
    { id: 7, name: 'Maxim', build: 'ALLROUNDER', level: 7, location: 'Lingen — Arena Lingen', badge: 'ARENA', badgeColor: '#ddaa22', reward: 'Arena-Ruf', flavor: 'Goldenes Jersey, laute Tribuene. Wenn Maxim faellt, weiss Mihler, dass Lingen gefallen ist.' },
    { id: 4, name: 'Coach Mihler', build: 'COACH', level: 8, location: 'Nordhorn — Finale-Halle', badge: 'CHAMPION', badgeColor: '#0f380f', reward: 'Nordhorn-Titel', flavor: 'Clipboard raus, letzter Trap. Er wartet, bis Nordhorn und Lingen deinen Namen kennen.', isFinalBoss: true }
  ],

  getAllTrainers() {
    return this.allTrainers.map(t => {
      const defeated = this.isTrainerDefeated(t.id);
      return { ...t, defeated };
    });
  },

  isTrainerDefeated(trainerId) {
    // Edge-case safe: older single-map builds do not define Maps, so fall back to current trainers.
    if (typeof Maps !== 'undefined' && Maps) {
      for (const mapName in Maps) {
        const map = Maps[mapName];
        if (map.trainers) {
          for (const t of map.trainers) {
            if (t.id === trainerId && (t.defeated || t.beaten)) return true;
          }
        }
      }
    }

    const wanted = String(trainerId).toLowerCase();
    return trainers.some(t => {
      const idMatch = String(t.id).toLowerCase() === wanted;
      const nameMatch = String(t.name || '').toLowerCase().indexOf(wanted) !== -1;
      return (idMatch || nameMatch) && (t.defeated || t.beaten);
    });
  },

  getDexProgress() {
    const all = this.getAllTrainers();
    const defeated = all.filter(t => t.defeated).length;
    return { total: all.length, defeated };
  }
};

const GameModules = {
  // Keep the debug registry aligned with the clean Gameboy UI. Disabled coach/advisor
  // modules are intentionally not part of the boot-status panel, even behind ?modules=1.
  modules: [
    { id: 'canvas', label: 'Canvas', check: () => !!(canvas && ctx) },
    { id: 'input', label: 'Input', check: () => typeof wasPressed === 'function' && !!(keys && keysPressed) },
    { id: 'map', label: 'Map', check: () => Array.isArray(worldMap) && worldMap.length === MAP_H && worldMap[0] && worldMap[0].length === MAP_W },
    { id: 'player', label: 'Player', check: () => !!(player && player.stats && Array.isArray(player.moves)) },
    { id: 'overworld', label: 'Clean Overworld', check: () => typeof drawOverworld === 'function' && typeof updateOverworld === 'function' && typeof drawCleanOverworldHUD === 'function' },
    { id: 'dialog', label: 'Dialog Flow', check: () => typeof startDialog === 'function' && typeof updateDialog === 'function' && !!dialog },
    { id: 'battle', label: 'Clean Battle', check: () => typeof startBattle === 'function' && typeof updateBattle === 'function' && typeof drawBattleHUD === 'function' && !!battle },
    { id: 'credits', label: 'Credits', check: () => typeof drawCredits === 'function' },
    { id: 'minimap', label: 'Minimap', check: () => !!(MinimapCache && typeof drawMinimap === 'function') },
    { id: 'dex', label: 'Spieler-Liste', check: () => !!(DexData && Array.isArray(DexData.allTrainers) && DexData.allTrainers.length === trainers.length) },
    { id: 'quest', label: 'Objective Marker', check: () => !!(ObjectiveTracker && typeof ObjectiveTracker.getNextTrainer === 'function' && typeof ObjectiveTracker.drawWorldMarker === 'function') },
    { id: 'homeRest', label: 'Home Rest', check: () => !!(HomeRest && HomeRest.homeY === 9 && typeof HomeRest.rest === 'function' && isWalkable(HomeRest.homeX, HomeRest.homeY)) },
    { id: 'compat', label: 'Browser Compat', check: () => !!(BrowserCompat && BrowserCompat.checks.length > 0) },
    { id: 'errors', label: 'Error Guard', check: () => !!(ErrorGuard && typeof ErrorGuard.safe === 'function') },
    { id: 'save', label: 'Save/Continue', check: () => !!(SaveSystem && typeof SaveSystem.save === 'function' && typeof SaveSystem.load === 'function') },
  ],
  showPanel: window.location.search.indexOf('modules=1') !== -1,

  getStatus() {
    return this.modules.map(module => {
      let ok = false;
      try {
        ok = !!module.check();
      } catch (err) {
        ok = false;
      }
      return { id: module.id, label: module.label, ok };
    });
  },

  getSummary() {
    const status = this.getStatus();
    const ready = status.filter(module => module.ok).length;
    return { ready, total: status.length, status };
  },

  renderBadge(x, y) {
    const summary = this.getSummary();
    const allReady = summary.ready === summary.total;
    ctx.fillStyle = allReady ? C.DARKEST : C.DARK;
    ctx.fillRect(x - 58, y - 10, 116, 15);
    ctx.fillStyle = C.LIGHT;
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('MODULES: ' + summary.ready + '/' + summary.total + (allReady ? ' OK' : ' WARN'), x, y);
    ctx.textAlign = 'left';
  },

  renderPanel() {
    if (!this.showPanel) return;
    const summary = this.getSummary();
    const x = 12;
    const y = 42;
    const w = 168;
    const h = 150;
    ctx.fillStyle = C.DARKEST;
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = C.LIGHT;
    ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
    ctx.fillStyle = C.DARKEST;
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('MODULE REGISTRY', x + 8, y + 14);
    ctx.font = '6px monospace';
    summary.status.forEach((module, index) => {
      ctx.fillText((module.ok ? '✓ ' : '! ') + module.label, x + 8, y + 28 + index * 9);
    });
  }
};

// ============================================================
// CODE COMMENT GUIDE (technical-debt documentation layer)
// ============================================================
// This block is intentionally close to INIT so future maintainers can scan it
// before following the runtime boot path. The game still lives in one inline
// script, so these comments explain where to look instead of forcing a risky
// module split during polish work.
//
// Architecture map:
// 1. BrowserCompat + ErrorGuard run first; they keep older browsers alive and
//    convert unexpected runtime failures into a recoverable title-screen state.
// 2. Constants, palette and tile IDs define the fixed Gameboy viewport and the
//    symbolic map language used by generateMap() and drawTile().
// 3. generateMap() builds the overworld once; MinimapCache.dirty must be set
//    whenever tiles are regenerated so the cached minimap layer refreshes.
// 4. Player, trainer, dialog and battle data are plain objects on purpose; save
//    data can be serialized without class migrations or prototype surprises.
// 5. Input is edge-triggered through keysPressed/wasPressed(). Hold-state keys
//    are only for movement; menus, dialogs and interactions use one-shot presses.
// 6. gameLoop() is the state-machine dispatcher. Rendering order matters:
//    world -> actors -> compact HUD/dialog -> toast/error guard, with coach overlays off.
// 7. DexData and GameModules are debug/status layers, not core gameplay; if a
//    debug badge fails, it should warn without preventing play or crowding the game.
const CodeComments = {
  sections: [
    { id: 'safety', label: 'Browser/Error safety' },
    { id: 'world', label: 'Map + minimap cache' },
    { id: 'player', label: 'Player data/save shape' },
    { id: 'input', label: 'Input edge triggers' },
    { id: 'dialog', label: 'Dialog/state flow' },
    { id: 'battle', label: 'Battle loop' },
    { id: 'polish', label: 'Dex/modules debug' }
  ],

  getSummary() {
    return { documented: this.sections.length, total: this.sections.length };
  },

  renderBadge(x, y) {
    const summary = this.getSummary();
    ctx.fillStyle = C.DARKEST;
    ctx.fillRect(x - 65, y - 9, 130, 13);
    ctx.fillStyle = C.LIGHT;
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CODE COMMENTS: ' + summary.documented + '/' + summary.total + ' OK', x, y);
    ctx.textAlign = 'left';
  }
};

// ============================================================
// INIT

generateMap();
