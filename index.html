<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nordhorn All Stars</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'%3E%3Crect width='16' height='16' fill='%230f380f'/%3E%3Crect x='2' y='2' width='12' height='12' fill='%239bbc0f'/%3E%3Crect x='5' y='4' width='6' height='8' fill='%230f380f'/%3E%3Crect x='6' y='5' width='4' height='2' fill='%239bbc0f'/%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f380f;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: monospace;
  image-rendering: pixelated;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
#gameCanvas {
  border: 4px solid #0f380f;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  width: min(960px, 95vw);
  height: min(864px, 95vh);
  height: min(864px, 95dvh);
  aspect-ratio: 480 / 432;
  max-width: calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right));
  max-height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
}

@supports not (height: 100dvh) {
  body { min-height: 100vh; }
  #gameCanvas { max-height: 95vh; }
}

/* ============ MOBILE TOUCH CONTROLS ============ */
#touchControls {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 200px;
  pointer-events: none;
  z-index: 100;
}
#touchControls.active { display: block; }

/* D-Pad */
.dpad {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 140px;
  height: 140px;
  pointer-events: auto;
}
.dpad-btn {
  position: absolute;
  width: 46px;
  height: 46px;
  background: rgba(48, 98, 48, 0.7);
  border: 2px solid #9bbc0f;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #9bbc0f;
  -webkit-tap-highlight-color: transparent;
}
.dpad-btn:active, .dpad-btn.pressed {
  background: rgba(155, 188, 15, 0.6);
  transform: scale(0.92);
}
.dpad-up { top: 0; left: 47px; }
.dpad-down { bottom: 0; left: 47px; }
.dpad-left { top: 47px; left: 0; }
.dpad-right { top: 47px; right: 0; }

/* Action Buttons */
.action-btns {
  position: absolute;
  bottom: 20px;
  right: 20px;
  width: 160px;
  height: 140px;
  pointer-events: auto;
}
.action-btn {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(48, 98, 48, 0.7);
  border: 2px solid #9bbc0f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: bold;
  color: #9bbc0f;
  -webkit-tap-highlight-color: transparent;
}
.action-btn:active, .action-btn.pressed {
  background: rgba(155, 188, 15, 0.6);
  transform: scale(0.92);
}
.btn-a { bottom: 30px; right: 0; }
.btn-b { bottom: 0; right: 70px; }

/* Menu Buttons */
.menu-btns {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
  pointer-events: auto;
}
.menu-btn {
  padding: 8px 16px;
  background: rgba(48, 98, 48, 0.7);
  border: 2px solid #9bbc0f;
  border-radius: 4px;
  font-size: 12px;
  color: #9bbc0f;
  font-family: monospace;
  -webkit-tap-highlight-color: transparent;
}
.menu-btn:active, .menu-btn.pressed {
  background: rgba(155, 188, 15, 0.6);
}

/* Landscape orientation hint */
@media (orientation: landscape) and (max-height: 500px) {
  #touchControls { height: 160px; }
  .dpad { bottom: 10px; left: 10px; width: 120px; height: 120px; }
  .dpad-btn { width: 40px; height: 40px; }
  .dpad-up { top: 0; left: 40px; }
  .dpad-down { bottom: 0; left: 40px; }
  .dpad-left { top: 40px; left: 0; }
  .dpad-right { top: 40px; right: 0; }
  .action-btns { bottom: 10px; right: 10px; }
}
</style>
</head>
<body>
<canvas id="gameCanvas" width="480" height="432"></canvas>

<!-- Mobile Touch Controls -->
<div id="touchControls">
  <div class="dpad">
    <div class="dpad-btn dpad-up" data-key="ArrowUp">▲</div>
    <div class="dpad-btn dpad-down" data-key="ArrowDown">▼</div>
    <div class="dpad-btn dpad-left" data-key="ArrowLeft">◀</div>
    <div class="dpad-btn dpad-right" data-key="ArrowRight">▶</div>
  </div>
  <div class="action-btns">
    <div class="action-btn btn-a" data-key="Enter">A</div>
    <div class="action-btn btn-b" data-key=" ">B</div>
  </div>
  <div class="menu-btns">
    <div class="menu-btn" data-key="m">MENU</div>
    <div class="menu-btn" data-key="x">SND</div>
  </div>
</div>

<script>
// ============================================================
// NORDHORN ALL STARS - Basketball RPG (Gameboy DMG style)
// ============================================================

// Cross-browser safety net: keep the game booting on older Safari/Firefox/Chromium builds.
(function installBrowserPolyfills() {
  if (!window.performance) window.performance = {};
  if (!window.performance.now) window.performance.now = function() { return Date.now(); };

  let lastTime = 0;
  const vendors = ['webkit', 'moz', 'ms', 'o'];
  for (let i = 0; i < vendors.length && !window.requestAnimationFrame; i++) {
    window.requestAnimationFrame = window[vendors[i] + 'RequestAnimationFrame'];
    window.cancelAnimationFrame = window[vendors[i] + 'CancelAnimationFrame'] || window[vendors[i] + 'CancelRequestAnimationFrame'];
  }
  if (!window.requestAnimationFrame) {
    window.requestAnimationFrame = function(callback) {
      const currTime = Date.now();
      const timeToCall = Math.max(0, 16 - (currTime - lastTime));
      const id = window.setTimeout(function() { callback(currTime + timeToCall); }, timeToCall);
      lastTime = currTime + timeToCall;
      return id;
    };
  }
  if (!window.cancelAnimationFrame) {
    window.cancelAnimationFrame = function(id) { clearTimeout(id); };
  }
})();

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const BrowserCompat = {
  checks: [],
  warnings: [],
  browserName: 'Unknown',
  showPanel: window.location.search.indexOf('compat=1') !== -1,

  detectBrowser() {
    const ua = navigator.userAgent || '';
    if (ua.indexOf('Firefox/') !== -1) return 'Firefox';
    if (ua.indexOf('Edg/') !== -1) return 'Edge';
    if (ua.indexOf('Chrome/') !== -1 || ua.indexOf('Chromium/') !== -1) return 'Chromium';
    if (ua.indexOf('Safari/') !== -1) return 'Safari';
    return 'Browser';
  },

  addCheck(label, ok, detail) {
    this.checks.push({ label, ok, detail });
    if (!ok) this.warnings.push(label + (detail ? ': ' + detail : ''));
  },

  run() {
    this.browserName = this.detectBrowser();
    this.addCheck('Canvas 2D', !!ctx, 'required for rendering');
    this.addCheck('requestAnimationFrame', typeof window.requestAnimationFrame === 'function', 'polyfilled when missing');
    this.addCheck('performance.now', !!(window.performance && performance.now), 'polyfilled when missing');
    this.addCheck('Keyboard input', typeof window.addEventListener === 'function', 'required for controls');
    this.addCheck('Pointer/touch fallback', true, (('ontouchstart' in window) || navigator.maxTouchPoints > 0) ? 'touch controls available' : 'keyboard controls active');
    this.addCheck('Monospace font', true, 'CSS fallback active');
  },

  summary() {
    return this.warnings.length ? 'WARN ' + this.warnings.length : 'OK';
  },

  renderBadge(x, y) {
    ctx.fillStyle = this.warnings.length ? C.DARK : C.DARKEST;
    ctx.fillRect(x - 58, y - 10, 116, 15);
    ctx.fillStyle = C.LIGHT;
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(this.browserName + ' COMPAT: ' + this.summary(), x, y);
    ctx.textAlign = 'left';
  },

  renderPanel() {
    if (!this.showPanel) return;
    const x = 294;
    const y = 42;
    const w = 174;
    const h = 104;
    ctx.fillStyle = C.DARKEST;
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = C.LIGHT;
    ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
    ctx.fillStyle = C.DARKEST;
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('CROSS-BROWSER TEST', x + 8, y + 14);
    ctx.font = '6px monospace';
    this.checks.slice(0, 7).forEach((check, index) => {
      ctx.fillText((check.ok ? '✓ ' : '! ') + check.label, x + 8, y + 28 + index * 10);
    });
  }
};

BrowserCompat.run();

// Gameboy DMG Green Palette
const C = {
  LIGHT: '#9bbc0f',
  MID: '#8bac0f',
  DARK: '#306230',
  DARKEST: '#0f380f',
  WHITE: '#9bbc0f',
  BLACK: '#0f380f'
};

// ============================================================
// ERROR GUARD (runtime edge-case handling)
// ============================================================

const ErrorGuard = {
  errors: [],
  overlayTimer: 0,
  validStates: ['TITLE', 'CHARSELECT', 'OVERWORLD', 'BATTLE', 'DIALOG', 'LOST', 'CREDITS'],

  record(source, error) {
    const message = error && error.message ? error.message : String(error || 'Unknown error');
    this.errors.unshift({ source, message, frame: (typeof frameCount !== 'undefined' ? frameCount : 0) });
    this.errors = this.errors.slice(0, 4);
    this.overlayTimer = 300;
    if (window.console && console.error) console.error('[ErrorGuard]', source, error);
  },

  safe(source, fn, fallback) {
    try {
      return fn();
    } catch (error) {
      this.record(source, error);
      if (typeof fallback === 'function') return fallback(error);
      return null;
    }
  },

  validateGameState() {
    if (this.validStates.indexOf(gameState) === -1) {
      this.record('gameState', 'Invalid state: ' + gameState);
      gameState = 'TITLE';
    }

    if (!Number.isFinite(player.x) || !Number.isFinite(player.y) || !isWalkable(player.x, player.y)) {
      this.record('player-position', 'Recovered invalid position ' + player.x + ',' + player.y);
      // Recover to the same walkable home-gate tile used by new-game, loss,
      // and HomeRest. The old y=6 fallback was inside the house, which made
      // ErrorGuard re-trigger every frame after a corrupt save/edge-case warp.
      player.x = (typeof HomeRest !== 'undefined' ? HomeRest.homeX : 5);
      player.y = (typeof HomeRest !== 'undefined' ? HomeRest.homeY : 9);
      player.facing = 'down';
    }

    player.maxHp = Math.max(1, Number(player.maxHp) || 100);
    player.maxEnergy = Math.max(1, Number(player.maxEnergy) || 20);
    player.hp = Math.max(0, Math.min(player.maxHp, Number(player.hp) || player.maxHp));
    player.energy = Math.max(0, Math.min(player.maxEnergy, Number(player.energy) || player.maxEnergy));

    if (!Array.isArray(player.moves) || player.moves.length === 0) {
      this.record('player-moves', 'Restored starter moves');
      player.moves = ['Layup', 'Jump Shot'];
    }

    if (gameState === 'BATTLE' && (!battle.currentTrainer || battle.phase === 'select' && (!battle.playerMoves || battle.playerMoves.length === 0))) {
      this.record('battle-state', 'Recovered incomplete battle state');
      battle.active = false;
      battle.currentTrainer = null;
      gameState = 'OVERWORLD';
      startDialog('Der Kampf wurde sicher abgebrochen.', 'Zurück auf den Court!');
    }
  },

  renderBadge(x, y) {
    const ok = this.errors.length === 0;
    ctx.fillStyle = ok ? C.DARKEST : C.DARK;
    ctx.fillRect(x - 58, y - 10, 116, 15);
    ctx.fillStyle = C.LIGHT;
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ERROR GUARD: ' + (ok ? 'OK' : 'RECOVERED'), x, y);
    ctx.textAlign = 'left';
  },

  renderOverlay() {
    if (this.overlayTimer <= 0 || this.errors.length === 0) return;
    this.overlayTimer--;
    const latest = this.errors[0];
    ctx.fillStyle = C.DARKEST;
    ctx.fillRect(8, 8, 250, 36);
    ctx.fillStyle = C.LIGHT;
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('FEHLER ABGEFANGEN: ' + latest.source, 14, 22);
    ctx.fillText(latest.message.substring(0, 34), 14, 34);
  }
};

window.addEventListener('error', (event) => ErrorGuard.record('window.error', event.error || event.message));
window.addEventListener('unhandledrejection', (event) => ErrorGuard.record('promise', event.reason));

const TILE = 16;
const VIEW_W = 480;
const VIEW_H = 432;
const VIEW_TILES_W = VIEW_W / TILE; // 30
const VIEW_TILES_H = VIEW_H / TILE; // 27

// Map definition (70x60 tiles)
// 0=grass, 1=path, 2=water, 3=tree, 4=building, 5=fence, 6=court_floor, 7=door, 8=roof, 9=flower, 10=bench
const MAP_W = 70;
const MAP_H = 60;

// Tile types
const T = {
  GRASS: 0, PATH: 1, WATER: 2, TREE: 3, BUILD: 4, FENCE: 5, COURT: 6, DOOR: 7, ROOF: 8, FLOWER: 10, BENCH: 11, BRIDGE: 12, STADIUM: 13, WALL: 14
};

// ============================================================
// CREDITS SCREEN
// ============================================================

function drawCredits() {
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // Background pattern
  ctx.fillStyle = C.MID;
  for (let y = 0; y < VIEW_H; y += 8) {
    for (let x = 0; x < VIEW_W; x += 8) {
      if ((x + y) % 16 === 0) ctx.fillRect(x, y, 4, 4);
    }
  }

  const cx = VIEW_W / 2;
  const scrollY = Math.floor(Date.now() / 30) % 500;

  ctx.fillStyle = C.DARKEST;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NORDHORN ALL STARS', cx, 60);

  ctx.font = '10px monospace';
  ctx.fillText('BASKETBALL RPG', cx, 80);

  ctx.fillStyle = C.DARK;
  ctx.font = '8px monospace';

  const lines = [
    '',
    '--- TEAM ---',
    '',
    'Game Design',
    'Jurica',
    '',
    'Programming',
    'Jurica & Hermes AI',
    '',
    'Art & Sprites',
    'Pixel Art by Jurica',
    '',
    'Music & Sound',
    'Chiptune Engine',
    '',
    '--- SPECIAL THANKS ---',
    '',
    'Nordhorn Basketball Community',
    '',
    'All the courts & players',
    'who inspired this game',
    '',
    '--- TRAINERS ---',
    '',
    'Klaus - The Rival',
    'Anna - The Student',
    'Markus - The Guardian',
    'Sophie - The Fighter',
    'Coach Mihler - The Master',
    '',
    '--- LOCATIONS ---',
    '',
    'Nordhorn',
    'Lingen',
    'The Ems River',
    'The Stadium',
    '',
    '',
    'Thank you for playing!',
    '',
    '',
    '© 2025 NORDHORN ALL STARS',
    'Made with love in Nordhorn',
  ];

  const startY = 110;
  const lineHeight = 14;

  lines.forEach((line, i) => {
    const y = startY + i * lineHeight - scrollY;
    if (y > 10 && y < VIEW_H - 20) {
      if (line.includes('---')) {
        ctx.fillStyle = C.DARK;
        ctx.font = 'bold 8px monospace';
      } else {
        ctx.fillStyle = C.DARKEST;
        ctx.font = '8px monospace';
      }
      ctx.fillText(line, cx, y);
    }
  });

  // Press enter prompt
  const blink = Math.floor(Date.now() / 500) % 2;
  if (blink) {
    ctx.fillStyle = C.DARK;
    ctx.font = '8px monospace';
    ctx.fillText('PRESS ENTER', cx, VIEW_H - 15);
  }

  ctx.textAlign = 'left';
}

// Generate map procedurally
let worldMap = [];
function generateMap() {
  // Fill with grass
  for (let y = 0; y < MAP_H; y++) {
    worldMap[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      worldMap[y][x] = T.GRASS;
    }
  }

  // Water border (river Ems on east side)
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 60; x < MAP_W; x++) {
      worldMap[y][x] = T.WATER;
    }
  }
  // Some water variation
  for (let y = 10; y < 50; y++) {
    worldMap[y][59] = T.WATER;
    if (y > 15 && y < 45) worldMap[y][58] = T.WATER;
  }

  // Main path (horizontal through center)
  for (let x = 0; x < 60; x++) {
    worldMap[28][x] = T.PATH;
    worldMap[29][x] = T.PATH;
  }
  // Vertical path
  for (let y = 5; y < 55; y++) {
    worldMap[y][25] = T.PATH;
    worldMap[y][26] = T.PATH;
  }
  // Path to stadium
  for (let y = 5; y < 28; y++) {
    worldMap[y][40] = T.PATH;
    worldMap[y][41] = T.PATH;
  }
  // Path to school
  for (let x = 26; x < 50; x++) {
    worldMap[10][x] = T.PATH;
    worldMap[11][x] = T.PATH;
  }

  // Home (player's house) - top-left area
  // Roof
  for (let x = 3; x < 9; x++) worldMap[3][x] = T.ROOF;
  // Walls
  for (let y = 4; y < 8; y++) {
    for (let x = 3; x < 9; x++) {
      worldMap[y][x] = T.BUILD;
    }
  }
  worldMap[7][5] = T.DOOR;
  worldMap[7][6] = T.DOOR;
  // Fence around yard
  for (let x = 2; x < 10; x++) worldMap[8][x] = T.FENCE;
  // Yard gate: keeps the starting path playable instead of trapping the player behind the fence.
  worldMap[8][5] = T.PATH;
  worldMap[8][6] = T.PATH;
  for (let y = 3; y < 8; y++) { worldMap[y][2] = T.FENCE; worldMap[y][9] = T.FENCE; }
  worldMap[2][5] = T.FENCE; worldMap[2][6] = T.FENCE;

  // School (top-right area for Nordhorn gymnasium)
  for (let x = 1; x < 22; x++) worldMap[13][x] = T.PATH;
  for (let x = 42; x < 56; x++) {
    for (let y = 5; y < 12; y++) {
      worldMap[y][x] = T.BUILD;
    }
  }
  for (let x = 42; x < 56; x++) worldMap[4][x] = T.ROOF;
  worldMap[11][48] = T.DOOR;
  worldMap[11][49] = T.DOOR;
  worldMap[11][43] = T.DOOR;
  // School yard
  for (let x = 52; x < 57; x++) {
    for (let y = 13; y < 18; y++) {
      worldMap[y][x] = T.COURT;
    }
  }

  // Basketball courts (community courts)
  for (let x = 12; x < 21; x++) {
    for (let y = 40; y < 48; y++) {
      worldMap[y][x] = T.COURT;
    }
  }
  // Court lines
  worldMap[40][14] = T.PATH;
  worldMap[40][15] = T.PATH;
  worldMap[40][18] = T.PATH;
  worldMap[40][19] = T.PATH;

  // Library (near center)
  for (let x = 35; x < 42; x++) {
    for (let y = 30; y < 36; y++) {
      worldMap[y][x] = T.BUILD;
    }
  }
  for (let x = 35; x < 42; x++) worldMap[29][x] = T.ROOF;
  worldMap[35][38] = T.DOOR;
  worldMap[35][37] = T.DOOR;

  // Stadium (big court at bottom)
  for (let x = 30; x < 52; x++) {
    for (let y = 45; y < 55; y++) {
      worldMap[y][x] = T.BUILD;
    }
  }
  for (let x = 30; x < 52; x++) worldMap[44][x] = T.ROOF;
  for (let x = 30; x < 52; x++) worldMap[54][x] = T.DOOR;
  // Stadium court inside
  for (let x = 34; x < 48; x++) {
    for (let y = 47; y < 53; y++) {
      worldMap[y][x] = T.COURT;
    }
  }

  // Trees scattered around
  const treePositions = [
    [10,3],[11,3],[12,3],[13,3],[14,3],
    [18,22],[19,22],[20,22],[18,23],[19,23],[20,23],
    [5,15],[6,15],[5,16],[6,16],
    [30,15],[31,15],[32,15],[30,16],[31,16],[32,16],
    [50,25],[51,25],[52,25],[50,26],[51,26],[52,26],
    [15,5],[16,5],
    [55,35],[56,35],[57,35],[55,36],[56,36],[57,36],
    [8,50],[9,50],[10,50],[11,50],[8,51],[9,51],[10,51],[11,51],
    [20,52],[21,52],[22,52],[23,52],[20,53],[21,53],[22,53],[23,53],
    // Trees along paths
    [25,20],[26,20],[25,35],[26,35],
    [15,28],[16,28],[17,28],
    [35,28],[36,28],
    [45,15],[46,15],[45,16],[46,16],
    // More trees
    [3,25],[4,25],[3,26],[4,26],
    [22,55],[23,55],[24,55],
  ];
  treePositions.forEach(([x,y]) => {
    if (y < MAP_H && x < MAP_W && worldMap[y][x] === T.GRASS)
      worldMap[y][x] = T.TREE;
  });

  // Flowers
  const flowerPositions = [
    [4,5],[7,5],[2,12],[8,12],[12,55],[18,52],[30,8],[35,50],[42,52],[50,50],
    [15,7],[22,5],[48,30],[55,8],[6,8],[38,55]
  ];
  flowerPositions.forEach(([x,y]) => {
    if (y < MAP_H && x < MAP_W && worldMap[y][x] === T.GRASS)
      worldMap[y][x] = T.FLOWER;
  });

  // Benches
  worldMap[37][38] = T.BENCH;
  worldMap[37][39] = T.BENCH;
  worldMap[40][16] = T.BENCH;

  // Bridge over river
  worldMap[28][57] = T.BRIDGE;
  worldMap[29][57] = T.BRIDGE;
  worldMap[28][58] = T.BRIDGE;
  worldMap[29][58] = T.BRIDGE;

  // Wall around stadium
  for (let x = 30; x < 52; x++) { worldMap[45][x] = T.WALL; worldMap[53][x] = T.WALL; }
  for (let y = 45; y < 55; y++) { worldMap[y][30] = T.WALL; worldMap[y][51] = T.WALL; }
}

function drawTile(x, y, tileType, camX, camY) {
  const sx = (x - camX) * TILE;
  const sy = (y - camY) * TILE;
  if (sx < -TILE || sx >= VIEW_W || sy < -TILE || sy >= VIEW_H) return;

  switch(tileType) {
    case T.GRASS:
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(sx, sy, TILE, TILE);
      // Grass detail
      ctx.fillStyle = C.MID;
      if ((x + y) % 3 === 0) ctx.fillRect(sx + 3, sy + 6, 2, 3);
      if ((x + y) % 4 === 1) ctx.fillRect(sx + 10, sy + 10, 2, 3);
      if ((x + y) % 5 === 2) ctx.fillRect(sx + 7, sy + 3, 2, 3);
      break;
    case T.PATH:
      ctx.fillStyle = C.MID;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = C.DARK;
      if ((x + y) % 4 === 0) ctx.fillRect(sx + 4, sy + 4, 4, 4);
      if ((x + y) % 5 === 2) ctx.fillRect(sx + 11, sy + 12, 3, 3);
      break;
    case T.WATER:
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = C.MID;
      // Water wave pattern
      const wave = (x * 3 + Date.now() / 500) % TILE;
      ctx.fillRect(sx + Math.floor(wave) % 8, sy + 4, 4, 2);
      ctx.fillRect(sx + (Math.floor(wave) + 5) % 12, sy + 10, 4, 2);
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(sx + 2 + Math.floor(wave * 0.7) % 6, sy + 7, 3, 1);
      break;
    case T.TREE:
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(sx, sy, TILE, TILE);
      // Tree trunk
      ctx.fillStyle = C.DARKEST;
      ctx.fillRect(sx + 6, sy + 10, 4, 6);
      // Tree canopy
      ctx.fillStyle = C.MID;
      ctx.fillRect(sx + 2, sy + 2, 12, 9);
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx + 3, sy + 3, 10, 7);
      ctx.fillStyle = C.MID;
      ctx.fillRect(sx + 4, sy + 4, 4, 4);
      break;
    case T.BUILD:
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = C.MID;
      ctx.fillRect(sx, sy, TILE - 1, TILE - 1);
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(sx + 1, sy + 1, 3, 3);
      ctx.fillRect(sx + 8, sy + 1, 3, 3);
      ctx.fillRect(sx + 1, sy + 8, 3, 3);
      ctx.fillRect(sx + 8, sy + 8, 3, 3);
      break;
    case T.ROOF:
      ctx.fillStyle = C.DARKEST;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx + 1, sy + 1, 14, 6);
      ctx.fillStyle = C.MID;
      for (let i = 0; i < 4; i++) ctx.fillRect(sx + 2 + i * 4, sy + 4, 3, 3);
      break;
    case T.FENCE:
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx + 1, sy + 2, 2, 12);
      ctx.fillRect(sx + 7, sy + 1, 2, 14);
      ctx.fillRect(sx + 13, sy + 2, 2, 12);
      ctx.fillRect(sx + 0, sy + 4, 16, 2);
      ctx.fillRect(sx + 0, sy + 10, 16, 2);
      break;
    case T.COURT:
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = '#5a5a3a';
      ctx.fillRect(sx + 1, sy + 1, 14, 14);
      // Court lines
      ctx.fillStyle = C.DARK;
      if (x % 8 === 0 || x % 8 === 7) {
        ctx.fillRect(sx + 7, sy, 2, TILE);
      }
      break;
    case T.DOOR:
      ctx.fillStyle = C.DARKEST;
      ctx.fillRect(sx + 2, sy + 1, 12, 15);
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx + 3, sy + 2, 10, 13);
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(sx + 4, sy + 3, 4, 5);
      break;
    case T.FLOWER:
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx + 7, sy + 11, 2, 5);
      ctx.fillStyle = '#9b59b6';
      if ((x + y) % 2 === 0) {
        ctx.fillRect(sx + 5, sy + 7, 6, 4);
      } else {
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(sx + 6, sy + 8, 4, 3);
      }
      break;
    case T.BENCH:
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = C.MID;
      ctx.fillRect(sx + 1, sy + 2, 14, 4);
      ctx.fillStyle = C.LIGHT;
      ctx.fillRect(sx + 2, sy + 3, 5, 2);
      ctx.fillRect(sx + 9, sy + 3, 5, 2);
      ctx.fillStyle = C.DARKEST;
      ctx.fillRect(sx + 1, sy + 6, 4, 10);
      ctx.fillRect(sx + 11, sy + 6, 4, 10);
      break;
    case T.BRIDGE:
      ctx.fillStyle = '#5a4a2a';
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = '#6b5b3b';
      ctx.fillRect(sx + 1, sy + 1, 14, 14);
      ctx.fillStyle = '#4a3a1a';
      ctx.fillRect(sx + 0, sy + 6, 16, 1);
      ctx.fillRect(sx + 0, sy + 11, 16, 1);
      break;
    case T.WALL:
      ctx.fillStyle = C.DARKEST;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = C.DARK;
      ctx.fillRect(sx, sy, TILE, TILE - 1);
      ctx.fillStyle = C.MID;
      for (let i = 0; i < 4; i++) ctx.fillRect(sx + i * 4, sy + 4, 3, 2);
      for (let i = 0; i < 4; i++) ctx.fillRect(sx + i * 4 - 2, sy + 8, 3, 2);
      break;
  }
}

function drawHoopsterSprite(x, y, opts = {}) {
  const scale = opts.scale || 1;
  const bob = opts.bob || 0;
  const facing = opts.facing || 'down';
  const skin = opts.skin || '#f0c8a0';
  const hair = opts.hair || '#4a3a1a';
  const jersey = opts.jersey || C.DARK;
  const trim = opts.trim || C.LIGHT;
  const pants = opts.pants || '#2040a0';
  const number = opts.number || '';
  const pose = opts.pose || 'idle';
  const px = Math.floor(x);
  const py = Math.floor(y - bob * scale);
  const rect = (rx, ry, rw, rh) => ctx.fillRect(px + rx * scale, py + ry * scale, rw * scale, rh * scale);

  // Grounded oval shadow keeps the 16px overworld scale readable.
  ctx.fillStyle = 'rgba(15, 56, 15, 0.65)';
  ctx.fillRect(px + 2 * scale, y + 15 * scale, 12 * scale, 2 * scale);

  // Legs and high-top shoes
  ctx.fillStyle = pants;
  rect(4, 13, 3, 4);
  rect(9, 13, 3, 4);
  ctx.fillStyle = C.DARKEST;
  rect(3, 16, 4, 2);
  rect(9, 16, 4, 2);
  ctx.fillStyle = trim;
  rect(4, 16, 2, 1);
  rect(10, 16, 2, 1);

  // Jersey with outline, collar and tiny player number
  ctx.fillStyle = C.DARKEST;
  rect(3, 8, 10, 7);
  ctx.fillStyle = jersey;
  rect(4, 8, 8, 6);
  ctx.fillStyle = trim;
  rect(5, 8, 2, 1);
  rect(9, 8, 2, 1);
  rect(4, 11, 8, 1);
  if (number) {
    ctx.fillStyle = C.DARKEST;
    ctx.font = `${Math.max(5, 5 * scale)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(String(number).slice(0, 2), px + 8 * scale, py + 14 * scale);
    ctx.textAlign = 'left';
  }

  // Arms: mirrored swing plus optional ball hand for basketball identity.
  ctx.fillStyle = skin;
  const swing = pose === 'dribble' ? 1 : (bob ? 1 : 0);
  rect(1, 9 + swing, 2, 5);
  rect(13, 9 + (swing ? 0 : 1), 2, 5);
  if (opts.ball) {
    ctx.fillStyle = '#d4600a';
    rect(facing === 'left' ? 0 : 14, 12 + swing, 3, 3);
    ctx.fillStyle = '#5a2a0a';
    rect(facing === 'left' ? 1 : 15, 13 + swing, 1, 1);
  }

  // Head silhouette, hair/hat and face direction.
  ctx.fillStyle = skin;
  rect(4, 3, 8, 6);
  ctx.fillStyle = hair;
  rect(3, 1, 10, 3);
  rect(2, 2, 12, 2);
  if (opts.headband) {
    ctx.fillStyle = opts.headband;
    rect(3, 4, 10, 1);
  }
  ctx.fillStyle = C.DARKEST;
  if (facing === 'down') {
    rect(6, 5, 1, 2);
    rect(10, 5, 1, 2);
    rect(7, 8, 3, 1);
  } else if (facing === 'left') {
    rect(5, 5, 1, 2);
    rect(4, 8, 3, 1);
  } else if (facing === 'right') {
    rect(10, 5, 1, 2);
    rect(9, 8, 3, 1);
  } else {
    ctx.fillStyle = hair;
    rect(4, 4, 8, 2);
  }

  // Pixel highlights for Aseprite-style depth.
  ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
  rect(5, 3, 2, 1);
  rect(5, 9, 1, 3);
}

function drawPlayer(camX, camY, facing, frame) {
  const px = Math.floor(player.x - camX) * TILE;
  const py = Math.floor(player.y - camY) * TILE;
  drawHoopsterSprite(px, py - 2, {
    facing,
    bob: frame ? 1 : 0,
    jersey: player.gender === 'boy' ? C.DARK : '#c06060',
    trim: player.gender === 'boy' ? C.LIGHT : '#ffd0d0',
    hair: player.gender === 'boy' ? '#4a3a1a' : '#2a1a0a',
    pants: player.gender === 'boy' ? '#2040a0' : '#402060',
    number: player.build === 'shooter' ? '3' : (player.build === 'defender' ? '5' : '8'),
    ball: player.moving,
    pose: player.moving ? 'dribble' : 'idle',
    headband: player.gender === 'girl' ? '#ffdfdf' : null,
  });
}

function drawTrainerSprite(trainer, camX, camY) {
  const px = (trainer.x - camX) * TILE;
  const py = (trainer.y - camY) * TILE;
  if (px < -TILE || px > VIEW_W || py < -TILE || py > VIEW_H) return;
  const colors = trainer.colors;
  drawHoopsterSprite(px, py - 2, {
    jersey: colors.body,
    trim: '#f8f8f8',
    hair: colors.hat,
    pants: colors.pants,
    number: trainer.id + 10,
    ball: !trainer.beaten,
    pose: trainer.beaten ? 'idle' : 'dribble',
    headband: colors.hat,
  });

  // Exclamation mark if not beaten
  if (!trainer.beaten) {
    const bobY = Math.sin(Date.now() / 300) * 1;
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(px + 6, py - 8 + bobY, 4, 6);
    ctx.fillStyle = '#ff6666';
    ctx.fillRect(px + 7, py - 7 + bobY, 2, 4);
  }
}

function clampStat(value, min, max, fallback) {
  const numeric = Number(value);
  const safeMax = Math.max(min, Number(max) || fallback || min);
  const safeValue = Number.isFinite(numeric) ? numeric : fallback;
  return Math.max(min, Math.min(safeMax, safeValue));
}

function clampInteger(value, min, max, fallback) {
  return Math.round(clampStat(value, min, max, fallback));
}

function sanitizePlayerStats(savedStats = {}) {
  const defaults = { dribbling: 5, shooting: 5, athleticism: 5, defense: 5, courtVision: 5 };
  return Object.fromEntries(Object.keys(defaults).map(key => [
    key,
    clampInteger(savedStats[key], 1, 30, defaults[key])
  ]));
}

const STARTER_MOVE_NAMES = ['Layup', 'Jump Shot'];

function getUnlockedMoveNames(level) {
  // Starter moves stay available from a fresh run, but later tier moves should
  // not appear one level early. This keeps save loading and battle menus aligned
  // with the visible level-up rewards.
  const safeLevel = clampInteger(level, 1, 50, 1);
  const levelUnlocked = Object.keys(MOVE_UNLOCKS)
    .filter(key => parseInt(key) <= safeLevel)
    .map(key => MOVE_UNLOCKS[key].name);
  return [...new Set([...STARTER_MOVE_NAMES, ...levelUnlocked])];
}

function sanitizeMoveList(savedMoves, level) {
  const allMoveNames = new Set(Object.values(MOVE_UNLOCKS).map(move => move.name));
  const unlockedNames = getUnlockedMoveNames(level);
  const savedValid = Array.isArray(savedMoves)
    ? savedMoves.filter(name => allMoveNames.has(name) && unlockedNames.includes(name))
    : [];
  const merged = [...new Set([...STARTER_MOVE_NAMES, ...savedValid, ...unlockedNames])];
  return merged.filter(name => allMoveNames.has(name));
}

function normalizeTrainerId(id) {
  const numeric = Number(id);
  return Number.isInteger(numeric) ? numeric : id;
}

// ============================================================
// SAVE SYSTEM (LocalStorage quick-continue)

const SaveSystem = {
  STORAGE_KEY: 'nordhorn_allstars_save_v2',
  lastMessage: '',
  toastTimer: 0,

  hasSave() {
    try { return !!localStorage.getItem(this.STORAGE_KEY); }
    catch (err) { return false; }
  },

  collect() {
    return {
      version: 2,
      savedAt: new Date().toISOString(),
      player: {
        x: player.x, y: player.y, facing: player.facing,
        gender: player.gender, build: player.build,
        level: player.level, exp: player.exp, expNext: player.expNext,
        maxHp: player.maxHp, hp: player.hp,
        maxEnergy: player.maxEnergy, energy: player.energy,
        stats: { ...player.stats },
        moves: [...player.moves],
        beatenTrainers: [...player.beatenTrainers],
        rivalBeaten: player.rivalBeaten,
      },
      trainers: trainers.map(t => ({ id: t.id, beaten: !!t.beaten })),
    };
  },

  save(reason = 'Progress saved') {
    try {
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.collect()));
      this.lastMessage = reason;
      this.toastTimer = 120;
      return true;
    } catch (err) {
      this.lastMessage = 'Save failed';
      this.toastTimer = 120;
      return false;
    }
  },

  load() {
    try {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (!data || !data.player) return false;
      const p = data.player;
      player.x = Number.isFinite(Number(p.x)) ? Number(p.x) : HomeRest.homeX;
      player.y = Number.isFinite(Number(p.y)) ? Number(p.y) : HomeRest.homeY;
      player.facing = ['up', 'down', 'left', 'right'].includes(p.facing) ? p.facing : 'down';
      player.moving = false;
      player.gender = ['boy', 'girl'].includes(p.gender) ? p.gender : 'boy';
      player.build = Object.prototype.hasOwnProperty.call(BUILD_BONUS, p.build) ? p.build : 'shooter';
      player.level = clampInteger(p.level, 1, 50, 1);
      player.exp = clampInteger(p.exp, 0, 99999, 0);
      player.expNext = clampInteger(p.expNext, 1, 99999, 20);
      player.maxHp = Number(p.maxHp) > 0 ? clampInteger(p.maxHp, 1, 999, 100) : 100;
      player.hp = clampInteger(p.hp, 1, player.maxHp, player.maxHp);
      player.maxEnergy = Number(p.maxEnergy) > 0 ? clampInteger(p.maxEnergy, 1, 999, 20) : 20;
      player.energy = clampInteger(p.energy, 0, player.maxEnergy, player.maxEnergy);
      player.stats = sanitizePlayerStats(p.stats);
      player.moves = sanitizeMoveList(p.moves, player.level);
      const knownTrainerIds = new Set(trainers.map(t => t.id));
      player.beatenTrainers = Array.isArray(p.beatenTrainers)
        ? [...new Set(p.beatenTrainers.map(normalizeTrainerId).filter(id => knownTrainerIds.has(id)))]
        : [];
      player.rivalBeaten = !!p.rivalBeaten;
      trainers.forEach(t => { t.beaten = player.beatenTrainers.includes(t.id); });
      if (Array.isArray(data.trainers)) {
        data.trainers.forEach(saved => {
          const trainer = saved ? trainers.find(t => t.id === normalizeTrainerId(saved.id)) : null;
          if (trainer) trainer.beaten = !!saved.beaten;
        });
      }
      // Keep old/new save shapes in sync. Some saves contain trainer-state but
      // not the newer beatenTrainers list; Continue must not lose badge progress,
      // count stale trainer IDs, or resume with NaN stats from corrupt slots.
      player.beatenTrainers = trainers.filter(t => t.beaten).map(t => t.id);
      player.rivalBeaten = trainers.every(t => t.beaten);
      if (!isWalkable(player.x, player.y)) movePlayerToHomeGate();
      gameState = 'OVERWORLD';
      startDialog('Save geladen!', 'Weiter geht es in Nordhorn.');
      this.lastMessage = 'Save loaded';
      this.toastTimer = 120;
      return true;
    } catch (err) {
      this.lastMessage = 'Save corrupt';
      this.toastTimer = 120;
      return false;
    }
  },

  clear() {
    try { localStorage.removeItem(this.STORAGE_KEY); } catch (err) {}
    this.toastTimer = 0;
    this.lastMessage = '';
  },

  getInfo() {
    try {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      const p = data.player || {};
      const date = data.savedAt ? new Date(data.savedAt) : null;
      const knownTrainerIds = new Set(trainers.map(t => t.id));
      const beatenIds = new Set(
        Array.isArray(p.beatenTrainers)
          ? p.beatenTrainers.map(normalizeTrainerId).filter(id => knownTrainerIds.has(id))
          : []
      );
      if (Array.isArray(data.trainers)) {
        data.trainers.forEach(saved => {
          const id = saved ? normalizeTrainerId(saved.id) : null;
          if (saved && saved.beaten && knownTrainerIds.has(id)) beatenIds.add(id);
        });
      }
      return {
        level: clampInteger(p.level, 1, 50, 1),
        beaten: beatenIds.size,
        time: date ? date.toLocaleDateString('de-DE') : 'unbekannt',
      };
    } catch (err) { return null; }
  },

  renderToast() {
    if (this.toastTimer <= 0) return;
    this.toastTimer--;
    const alpha = Math.min(1, this.toastTimer / 30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = C.DARKEST;
    ctx.fillRect(VIEW_W - 118, VIEW_H - 34, 112, 18);
    ctx.fillStyle = C.LIGHT;
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SAVE ' + this.lastMessage, VIEW_W - 62, VIEW_H - 22);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
};

function resetRunProgress() {
  movePlayerToHomeGate();
  player.level = 1;
  player.exp = 0;
  player.expNext = 20;
  player.maxHp = 100;
  player.hp = 100;
  player.maxEnergy = 20;
  player.energy = 20;
  player.moves = ['Layup', 'Jump Shot'];
  player.beatenTrainers = [];
  player.rivalBeaten = false;
  trainers.forEach(t => { t.beaten = false; });
}

// ============================================================
// EASTER EGG SYSTEM
// ============================================================

const KONAMI = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
let konamiIndex = 0;
let easterEggActive = false;

function checkEasterEgg(key) {
  if (key === KONAMI[konamiIndex]) {
    konamiIndex++;
    if (konamiIndex === KONAMI.length) {
      konamiIndex = 0;
      easterEggActive = !easterEggActive;
      if (easterEggActive) {
        // Bonus: Unlock all moves
        player.stats.dribbling += 5;
        player.stats.shooting += 5;
        player.stats.athleticism += 5;
        player.stats.defense += 5;
        player.stats.courtVision += 5;
        player.maxHp += 20;
        player.hp = player.maxHp;
        startDialog('KONAMI CODE!', '+5 All Stats, +20 HP!');
        gameState = 'DIALOG';
      }
    }
  } else {
    konamiIndex = 0;
  }
}

// Input
const keys = {};
const keysPressed = {};
window.addEventListener('keydown', (e) => {
  if (!keys[e.key]) keysPressed[e.key] = true;
  keys[e.key] = true;
  ErrorGuard.safe('input', () => checkEasterEgg(e.key));
  e.preventDefault();
});
window.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

// Legacy coach/advisor overlay modules were removed after the clean-UI pass.
// Keep only inert visibility flags for old save/debug paths that may still clear them;
// normal play must stay classic Gameboy: map/actors/HUD or court/players/score/menu.
const ControlsHelp = { visible: false };
const ScoutCard = { visible: false };

const HomeRest = {
  homeX: 5,
  homeY: 9,
  radius: 3,

  getDistance() {
    return Math.abs(player.x - this.homeX) + Math.abs(player.y - this.homeY);
  },

  isAvailable() {
    return this.getDistance() <= this.radius;
  },

  needsRest() {
    return player.hp < player.maxHp || player.energy < player.maxEnergy;
  },

  rest() {
    if (!this.isAvailable()) return false;
    player.hp = player.maxHp;
    player.energy = player.maxEnergy;
    SaveSystem.save('Rested at home');
    startDialog('HOME COURT', 'Mom: HP and energy restored.');
    gameState = 'DIALOG';
    return true;
  },
};

function movePlayerToHomeGate() {
  // Single source of truth for respawns/new runs. Keeping every return-home flow
  // on the same walkable gate avoids old hard-coded house-tile regressions.
  player.x = HomeRest.homeX;
  player.y = HomeRest.homeY;
  player.facing = 'down';
  player.moving = false;
}

function wrapText(text, x, y, maxWidth, lineHeight) {
  const words = String(text).split(' ');
  let line = '';
  for (let i = 0; i < words.length; i++) {
    const testLine = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(testLine).width > maxWidth && line) {
      ctx.fillText(line, x, y);
      line = words[i];
      y += lineHeight;
    } else {
      line = testLine;
    }
  }
  if (line) ctx.fillText(line, x, y);
}

const CoachTip = { visible: false };

function wasPressed(key) {
  if (keysPressed[key]) { keysPressed[key] = false; return true; }
  return false;
}

function wasConfirmPressed() {
  // Keep the printed controls honest: Enter, Space, A and B are confirm/action.
  // Check every confirm alias before returning so simultaneous presses cannot
  // leave a stale confirm edge for the next state/menu frame.
  const enter = wasPressed('Enter');
  const space = wasPressed(' ');
  const legacySpace = wasPressed('Spacebar');
  const a = wasPressed('a') || wasPressed('A');
  const b = wasPressed('b') || wasPressed('B');
  return enter || space || legacySpace || a || b;
}

function wasCreditsPressed() {
  // Browser key values preserve Shift, so accept both c and C for the title hint.
  const lower = wasPressed('c');
  const upper = wasPressed('C');
  return lower || upper;
}

function clearPressedInput() {
  // Prevent the confirm key that closes a dialog/menu from immediately firing
  // the first battle move on the next state. Hold-state movement remains intact.
  Object.keys(keysPressed).forEach(key => { keysPressed[key] = false; });
}

function setBattleMessage(message, subMessage = '', feedbackTimer = 0) {
  // Keep the compact battle message box truthful: every new action replaces the
  // previous context line so old intro/energy text cannot linger under later moves.
  battle.message = message;
  battle.subMessage = subMessage || '';
  battle.feedbackTimer = feedbackTimer;
}

function enforceCleanGameboyUI() {
  // Safety net for the post-declutter build: old help/scout/coach objects still
  // exist for save/debug compatibility, but they must never become visible in
  // normal play. Keep the actual render path classic: map + actors + compact HUD,
  // or court + players + score/HP/EN/menu/message.
  [ControlsHelp, ScoutCard, CoachTip].forEach(panel => {
    if (panel && panel.visible) panel.visible = false;
  });
}

// ============================================================
// BATTLE SYSTEM
// ============================================================

function getPlayerMoves() {
  const availableNames = sanitizeMoveList(player.moves, player.level);
  player.moves = availableNames;
  return availableNames
    .map(name => Object.values(MOVE_UNLOCKS).find(move => move.name === name))
    .filter(Boolean);
}

function getEnemyMoves(enemyLevel) {
  const moves = [];
  const maxMove = Math.min(enemyLevel + 1, 8);
  for (let i = 1; i <= maxMove; i++) {
    moves.push(MOVE_UNLOCKS[i]);
  }
  return moves;
}

function startBattle(trainer) {
  gameState = 'BATTLE';
  clearPressedInput();
  ControlsHelp.visible = false;
  ScoutCard.visible = false;
  CoachTip.visible = false;
  battle.active = true;
  battle.currentTrainer = trainer;
  battle.playerScore = 0;
  battle.enemyScore = 0;
  battle.playerTurn = true;
  battle.phase = 'select';
  battle.selectedMove = 0;
  battle.playerEnergy = player.energy;
  battle.enemyMaxEnergy = trainer.enemyEnergy || 20;
  battle.enemyEnergy = battle.enemyMaxEnergy;
  battle.playerHp = player.hp;
  battle.enemyHp = trainer.playerHp;
  battle.ballOwner = 'player';
  battle.hasBall = true;
  battle.turnCount = 0;
  battle.playerBlockNext = false;
  battle.enemyBlockNext = false;
  battle.playerBuffed = false;
  battle.enemyBuffed = false;
  battle.playerMoves = getPlayerMoves();
  battle.enemyMoves = getEnemyMoves(trainer.level);
  setBattleMessage(
    trainer.name + ' wants to battle!',
    'LV ' + trainer.level + ' ' + trainer.aiStyle + ' - first to ' + trainer.ptsToWin,
    120
  );
}

function calculateDamage(move, attacker, defender) {
  let baseDamage = move.power || 10;
  let accuracy = 0.7;

  if (move.type === 'attack') {
    if (move.pts === 2) {
      baseDamage += attacker.stats.shooting * 2;
      accuracy = 0.75 + attacker.stats.shooting * 0.03;
    } else if (move.pts === 3) {
      baseDamage += attacker.stats.shooting * 3;
      accuracy = 0.5 + attacker.stats.shooting * 0.04;
    } else if (move.special) {
      baseDamage += attacker.stats.defense * 2;
      accuracy = 0.65 + attacker.stats.defense * 0.03;
    }
  }

  // Defense reduction
  let damage = baseDamage - defender.stats.defense;
  damage = Math.max(5, damage);

  return { damage: Math.floor(damage), accuracy: Math.min(accuracy, 0.95) };
}

function executePlayerMove() {
  const move = battle.playerMoves[battle.selectedMove];
  const affordableMove = battle.playerMoves.some(m => battle.playerEnergy >= (m.energy || 0));
  if (!move) return;
  if (battle.playerEnergy < (move.energy || 0)) {
    if (!affordableMove) {
      // If every move is out of reach, let the player spend the turn catching
      // breath instead of getting stuck in the move menu. This uses only the
      // existing compact battle message box, not another HUD/helper overlay.
      battle.playerEnergy = Math.min(player.maxEnergy, battle.playerEnergy + PLAYER_ENERGY_REGEN);
      battle.phase = 'anim';
      battle.animTimer = 45;
      setBattleMessage('You catch breath...', '+' + PLAYER_ENERGY_REGEN + ' EN', 90);
      battle.turnCount++;
      setTimeout(() => endTurn(), 900);
      return;
    }
    setBattleMessage('Not enough energy!', move.name + ' needs ' + (move.energy || 0) + ' EN', 120);
    return;
  }

  battle.playerEnergy -= (move.energy || 0);
  battle.phase = 'anim';
  battle.animTimer = 60;
  battle.feedbackTimer = 0;

  if (move.special && move.name === 'Block') {
    // Block reduces next enemy attack
    battle.playerBlockNext = true;
    setBattleMessage('You prepare to block!');
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
  } else if (move.special && move.name === 'Steal') {
    const success = Math.random() < (0.4 + player.stats.dribbling * 0.05);
    if (success) {
      const dmg = 8 + Math.floor(Math.random() * 5);
      battle.enemyHp -= dmg;
      setBattleMessage('Steal success! -' + dmg + ' HP');
      battle.ballOwner = 'player';
      battle.hasBall = true;
    } else {
      setBattleMessage('Steal failed!');
    }
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
  } else if (move.type === 'buff') {
    battle.playerBuffed = true;
    setBattleMessage('Analyzing court... Next shot boosted!');
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
  } else {
    // Attack move
    const calc = calculateDamage(move, player, { stats: { defense: battle.currentTrainer.defense || battle.currentTrainer.level * 2 } });

    let accuracy = calc.accuracy;
    if (battle.playerBuffed) { accuracy = Math.min(0.95, accuracy + 0.2); battle.playerBuffed = false; }

    const success = Math.random() < accuracy;

    if (success) {
      const points = move.pts;
      battle.enemyHp -= calc.damage;
      battle.playerScore += points;
      setBattleMessage(move.name + '! ' + points + ' pts! -' + calc.damage + ' HP');
      battle.ballOwner = 'enemy'; // opponent gets ball after scoring
      battle.hasBall = false;
    } else {
      setBattleMessage(move.name + ' missed!');
      battle.ballOwner = 'enemy';
      battle.hasBall = false;
    }
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
  }
}

function chooseEnemyMove(availableMoves) {
  const trainer = battle.currentTrainer;
  const behind = battle.enemyScore < battle.playerScore;
  const lowHp = battle.enemyHp < trainer.playerHp * 0.35;
  const canShootThree = availableMoves.filter(m => m.pts === 3);
  const canDefend = availableMoves.filter(m => m.special || m.type === 'buff');

  // Late-game trainers play smarter: catch up with threes, protect low HP,
  // otherwise favor efficient two-pointers over pure randomness.
  if (behind && trainer.level >= 3 && canShootThree.length && Math.random() < 0.55) {
    return canShootThree[Math.floor(Math.random() * canShootThree.length)];
  }
  if (lowHp && canDefend.length && Math.random() < 0.45) {
    return canDefend[Math.floor(Math.random() * canDefend.length)];
  }

  const weighted = [];
  availableMoves.forEach(move => {
    let weight = 2;
    if (move.pts === 2) weight += 2;
    if (move.pts === 3 && trainer.aiStyle === 'Shooter') weight += 3;
    if (move.name === 'Block' && trainer.aiStyle === 'Defender') weight += 4;
    if (move.name === 'Court Vision' && trainer.aiStyle === 'Playmaker') weight += 3;
    if ((move.energy || 0) > battle.enemyEnergy - 2) weight -= 1;
    for (let i = 0; i < Math.max(1, weight); i++) weighted.push(move);
  });
  return weighted[Math.floor(Math.random() * weighted.length)];
}

function executeEnemyMove() {
  const availableMoves = battle.enemyMoves.filter(m => battle.enemyEnergy >= (m.energy || 0));
  if (availableMoves.length === 0) {
    // Skip the action and let the normal end-turn regeneration apply exactly once.
    // Earlier builds added +5 here and then applied trainer regen again in endTurn,
    // making exhausted rivals bounce back too hard without any readable reason.
    const regen = battle.currentTrainer.regen || 3;
    setBattleMessage(battle.currentTrainer.name + ' rests...', '+' + regen + ' EN');
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
    return;
  }

  const move = chooseEnemyMove(availableMoves);
  battle.enemyEnergy -= (move.energy || 0);
  battle.phase = 'anim';
  battle.animTimer = 60;

  if (move.special && move.name === 'Block') {
    battle.enemyBlockNext = true;
    setBattleMessage(battle.currentTrainer.name + ' prepares to block!');
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
  } else if (move.special && move.name === 'Steal') {
    const success = Math.random() < (0.3 + battle.currentTrainer.level * 0.05);
    if (success) {
      let dmg = 8 + Math.floor(Math.random() * 5);
      if (battle.playerBlockNext) { dmg = Math.floor(dmg / 2); battle.playerBlockNext = false; }
      battle.playerHp -= dmg;
      setBattleMessage(battle.currentTrainer.name + ' steals! -' + dmg + ' HP');
      battle.ballOwner = 'enemy';
      battle.hasBall = false;
    } else {
      setBattleMessage('Steal failed!');
    }
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
  } else if (move.type === 'buff') {
    battle.enemyBuffed = true;
    setBattleMessage(battle.currentTrainer.name + ' analyzes the court...');
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
  } else {
    const calc = calculateDamage(move, { stats: { shooting: battle.currentTrainer.offense || battle.currentTrainer.level * 2 } }, { stats: { defense: player.stats.defense } });

    let accuracy = calc.accuracy;
    if (battle.enemyBuffed) { accuracy = Math.min(0.95, accuracy + 0.2); battle.enemyBuffed = false; }
    if (battle.playerBlockNext) { accuracy *= 0.5; battle.playerBlockNext = false; }

    const success = Math.random() < accuracy;

    if (success) {
      const points = move.pts;
      battle.playerHp -= calc.damage;
      battle.enemyScore += points;
      setBattleMessage(
        battle.currentTrainer.name + ': ' + move.name + '! ' + points + ' pts!',
        '-' + calc.damage + ' HP'
      );
      battle.ballOwner = 'player';
      battle.hasBall = true;
    } else {
      setBattleMessage(battle.currentTrainer.name + ' missed!');
      battle.ballOwner = 'player';
      battle.hasBall = true;
    }
    battle.turnCount++;
    setTimeout(() => endTurn(), 1000);
  }
}

function endTurn() {
  // Check win/lose
  const ptsToWin = battle.currentTrainer.ptsToWin;

  if (battle.playerScore >= ptsToWin || battle.enemyHp <= 0) {
    const resultDetail = battle.enemyHp <= 0
      ? battle.currentTrainer.name + ' is out! Score: ' + battle.playerScore + ' - ' + battle.enemyScore
      : 'Score: ' + battle.playerScore + ' - ' + battle.enemyScore;
    setBattleMessage('YOU WIN!', resultDetail);
    battle.phase = 'result';
    setTimeout(() => winBattle(), 2500);
    return;
  }

  if (battle.enemyScore >= ptsToWin) {
    setBattleMessage('You lost...', 'Score: ' + battle.playerScore + ' - ' + battle.enemyScore);
    battle.phase = 'result';
    setTimeout(() => loseBattle(), 2500);
    return;
  }

  if (battle.playerHp <= 0) {
    setBattleMessage('You collapsed...', 'Score: ' + battle.playerScore + ' - ' + battle.enemyScore);
    battle.phase = 'result';
    setTimeout(() => loseBattle(), 2500);
    return;
  }

  // Switch turns
  if (battle.turnCount % 2 === 0) {
    battle.playerTurn = true;
    battle.phase = 'select';
    battle.selectedMove = 0;
    // Energy regen
    battle.playerEnergy = Math.min(player.maxEnergy, battle.playerEnergy + PLAYER_ENERGY_REGEN);
    battle.enemyEnergy = Math.min(battle.enemyMaxEnergy, battle.enemyEnergy + (battle.currentTrainer.regen || 3));
  } else {
    battle.playerTurn = false;
    battle.phase = 'anim';
    setBattleMessage(battle.currentTrainer.name + "'s turn...");
    setTimeout(() => executeEnemyMove(), 800);
  }
}

function winBattle() {
  const trainer = battle.currentTrainer;
  if (!trainer.beaten) {
    trainer.beaten = true;
    player.beatenTrainers.push(trainer.id);
  }

  // Carry the played battle back into the overworld before saving.
  // Earlier builds only persisted score/EXP, so post-fight HP/EN HUDs could
  // show pre-battle values and make the next duel/rest decision misleading.
  player.hp = Math.max(1, Math.min(player.maxHp, battle.playerHp));
  player.energy = Math.max(0, Math.min(player.maxEnergy, battle.playerEnergy));

  // EXP gain
  const expGain = trainer.expReward || (15 + trainer.level * 10);
  player.exp += expGain;
  setBattleMessage('Gained ' + expGain + ' EXP!');

  // Check level up
  while (player.exp >= player.expNext) {
    player.exp -= player.expNext;
    player.level++;
    player.expNext = Math.floor(player.expNext * 1.5);
    player.maxHp += 8;
    player.maxEnergy += 2;
    player.hp = player.maxHp;
    player.energy = player.maxEnergy;
    // Stat increases
    player.stats.dribbling += 1;
    player.stats.shooting += 1;
    player.stats.athleticism += 1;
    player.stats.defense += 1;
    player.stats.courtVision += 1;
    // Unlock the move for the level just reached. The player already starts with
    // the level-1/2 basics, so later level-ups should not skip ahead by one tier.
    const newMove = MOVE_UNLOCKS[player.level];
    if (newMove && !player.moves.includes(newMove.name)) {
      player.moves.push(newMove.name);
      battle.subMessage = 'LEARNED ' + newMove.name + '!';
    }
  }

  SaveSystem.save('Victory saved');
  battle.phase = 'result';
  setTimeout(() => endBattle(), 2000);
}

function loseBattle() {
  battle.phase = 'result';
  setTimeout(() => {
    battle.active = false;
    // Reset to the same safe home gate used by new-game and ErrorGuard.
    player.hp = player.maxHp;
    player.energy = player.maxEnergy;
    movePlayerToHomeGate();
    SaveSystem.save('Rest saved');
    gameState = 'OVERWORLD';
    startDialog("You went home to rest...", "Mom: Feel better soon!", () => {
      gameState = 'OVERWORLD';
    });
  }, 2000);
}

function endBattle() {
  const defeatedTrainer = battle.currentTrainer;
  battle.active = false;
  gameState = 'OVERWORLD';
  const allTrainersBeaten = trainers.every(t => t.beaten);
  if (allTrainersBeaten) {
    startDialog('CHAMPION!', 'Alle Rivalen besiegt. Die Credits rollen jetzt.', () => {
      gameState = 'CREDITS';
    });
    return;
  }

  // Keep post-battle feedback in the existing dialog box only: name the beaten
  // rival and show compact progress without adding any battle/coach HUD modules.
  const beatenCount = trainers.filter(t => t.beaten).length;
  const trainerName = defeatedTrainer ? defeatedTrainer.name : 'Rivale';
  startDialog('Victory!', trainerName + ' besiegt! Siege: ' + beatenCount + '/' + trainers.length, () => {
    gameState = 'OVERWORLD';
  });
}

// ============================================================
// DIALOG SYSTEM
// ============================================================

function startDialog(text, subText, onComplete = null) {
  dialog.active = true;
  dialog.text = text;
  dialog.subText = subText || '';
  dialog.displayed = '';
  dialog.charIndex = 0;
  dialog.timer = 0;
  dialog.typing = dialog.text.length > 0;
  dialog.onComplete = onComplete;
  // Non-battle dialogs must own the state so they can type, accept input,
  // and reliably return to the map after intro/load/victory/defeat flows.
  if (gameState !== 'BATTLE') gameState = 'DIALOG';
}

function finishDialog() {
  dialog.active = false;
  const onComplete = dialog.onComplete;
  dialog.onComplete = null;
  if (onComplete) onComplete();
  else if (gameState === 'DIALOG') gameState = 'OVERWORLD';
  clearPressedInput();
}

function updateDialog() {
  if (!dialog.active) return;

  if (dialog.typing && dialog.charIndex < dialog.text.length) {
    dialog.timer++;
    if (dialog.timer >= 2) {
      dialog.timer = 0;
      dialog.displayed += dialog.text[dialog.charIndex];
      dialog.charIndex++;
      if (dialog.charIndex >= dialog.text.length) {
        dialog.typing = false;
      }
    }
  }

  if (wasConfirmPressed()) {
    if (dialog.typing && dialog.charIndex < dialog.text.length) {
      dialog.displayed = dialog.text;
      dialog.charIndex = dialog.text.length;
      dialog.typing = false;
    } else {
      finishDialog();
    }
  }

  if (wasPressed('Escape')) {
    // Escape is an alternate close button, not a callback skip. This keeps
    // battle-result flows (especially Champion → Credits) from stranding the
    // player in the overworld with every rival already beaten.
    finishDialog();
  }
}

function getWrappedDialogLines(text, maxChars) {
  const words = String(text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let line = '';

  words.forEach(word => {
    const candidate = line ? line + ' ' + word : word;
    if (candidate.length > maxChars && line) {
      lines.push(line);
      line = word;
    } else {
      line = candidate;
    }
  });

  if (line) lines.push(line);
  return lines.length ? lines : [''];
}

function drawDialog() {
  if (!dialog.active) return;
  // Dialog box
  const boxY = VIEW_H - 80;
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(0, boxY, VIEW_W, 80);
  ctx.fillStyle = C.DARK;
  ctx.fillRect(2, boxY + 2, VIEW_W - 4, 76);
  ctx.fillStyle = C.DARKEST;
  ctx.fillRect(4, boxY + 4, VIEW_W - 8, 72);
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(6, boxY + 6, VIEW_W - 12, 68);

  // Text — wrap long NPC/victory lines instead of letting them spill off-screen.
  ctx.fillStyle = C.DARKEST;
  ctx.font = '10px monospace';
  const lines = getWrappedDialogLines(dialog.displayed, 46).slice(0, 3);
  lines.forEach((line, index) => {
    ctx.fillText(line, 14, boxY + 22 + index * 14);
  });

  if (dialog.subText && dialog.charIndex >= dialog.text.length) {
    ctx.font = '9px monospace';
    const subLines = getWrappedDialogLines(dialog.subText, 52).slice(0, 2);
    const subStartY = boxY + 24 + lines.length * 14;
    subLines.forEach((line, index) => {
      if (subStartY + index * 12 < boxY + 66) ctx.fillText(line, 14, subStartY + index * 12);
    });
  }

  // Continue prompt
  if (!dialog.typing) {
    const blink = Math.floor(Date.now() / 300) % 2;
    if (blink) {
      ctx.fillStyle = C.DARKEST;
      ctx.font = '10px monospace';
      ctx.fillText('▼', VIEW_W - 20, boxY + 60);
    }
  }
}

// ============================================================

function drawTitleScreen() {
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // Background pattern
  ctx.fillStyle = C.MID;
  for (let y = 0; y < VIEW_H; y += 4) {
    for (let x = 0; x < VIEW_W; x += 4) {
      if ((x + y) % 8 === 0) ctx.fillRect(x, y, 2, 2);
    }
  }

  // Basketball icon
  const bx = VIEW_W / 2;
  const by = 120;
  ctx.fillStyle = '#d4600a';
  ctx.beginPath();
  ctx.arc(bx, by, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c0500a';
  ctx.beginPath();
  ctx.arc(bx, by, 28, 0, Math.PI * 2);
  ctx.fill();
  // Basketball lines
  ctx.strokeStyle = '#2a1a0a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(bx, by, 28, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx - 28, by);
  ctx.lineTo(bx + 28, by);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx, by - 28);
  ctx.lineTo(bx, by + 28);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(bx - 14, by, 20, -0.8, 0.8);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(bx + 14, by, 20, Math.PI - 0.8, Math.PI + 0.8);
  ctx.stroke();

  // Title — keep the first screen clean and playable. The previous stacked system/coach
  // badges covered the logo and menu; gameplay stays focused on classic Gameboy UI only.
  ctx.fillStyle = C.DARKEST;
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NORDHORN', bx, 188);
  ctx.fillText('ALL STARS', bx, 218);

  // Subtitle
  ctx.fillStyle = C.DARK;
  ctx.font = '10px monospace';
  ctx.fillText('BASKETBALL RPG', bx, 242);

  // New/Continue menu
  const hasSave = SaveSystem.hasSave();
  if (!hasSave) titleSelection = 0;
  const saveInfo = SaveSystem.getInfo();
  const blink = Math.floor(Date.now() / 500) % 2;
  ctx.font = '11px monospace';
  ctx.fillStyle = C.DARKEST;
  ctx.fillText((titleSelection === 0 && blink ? '> ' : '  ') + 'NEW GAME', bx, 278);
  ctx.fillStyle = hasSave ? C.DARKEST : C.MID;
  ctx.fillText((titleSelection === 1 && blink ? '> ' : '  ') + 'CONTINUE', bx, 298);
  if (saveInfo) {
    ctx.font = '7px monospace';
    ctx.fillStyle = C.DARK;
    ctx.fillText('LV ' + saveInfo.level + ' · WINS ' + saveInfo.beaten + '/5 · ' + saveInfo.time, bx, 312);
  }

  // Controls and compact smoke-test status
  ctx.fillStyle = C.DARK;
  ctx.font = '8px monospace';
  ctx.fillText('UP/DOWN Select · ENTER/A/B Start · C Credits', bx, 344);

  ctx.fillStyle = C.DARKEST;
  ctx.fillRect(bx - 78, 370, 156, 28);
  ctx.fillStyle = C.LIGHT;
  ctx.font = '7px monospace';
  // Keep title status calm after the HUD declutter: no coach/module counter spam.
  ctx.fillText('GAMEBOY CLEAN · ' + BrowserCompat.summary(), bx, 382);
  ctx.fillText('A/B/ENTER START · C CREDITS', bx, 394);
  BrowserCompat.renderPanel();
  GameModules.renderPanel();

  // Footer
  ctx.fillStyle = C.DARK;
  ctx.font = '6px monospace';
  ctx.fillText('© 2026 NORDHORN ALL STARS', bx, 424);

  ctx.textAlign = 'left';
}

function drawCharSelect() {
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  ctx.fillStyle = C.MID;
  for (let i = 0; i < VIEW_W; i += 8) {
    ctx.fillRect(i, 0, 4, VIEW_H);
  }

  ctx.fillStyle = C.DARKEST;
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';

  if (charSelect.phase === 'gender') {
    ctx.fillText('CHOOSE YOUR GENDER', VIEW_W / 2, 80);

    // Boy
    ctx.fillStyle = charSelect.gender === 0 ? C.DARK : C.MID;
    ctx.fillRect(VIEW_W / 2 - 80, 130, 60, 80);
    drawCharPortrait(VIEW_W / 2 - 50, 145, 'boy');
    ctx.fillStyle = C.DARKEST;
    ctx.font = '10px monospace';
    ctx.fillText('BOY', VIEW_W / 2 - 50, 225);

    // Girl
    ctx.fillStyle = charSelect.gender === 1 ? C.DARK : C.MID;
    ctx.fillRect(VIEW_W / 2 + 20, 130, 60, 80);
    drawCharPortrait(VIEW_W / 2 + 50, 145, 'girl');
    ctx.fillStyle = C.DARKEST;
    ctx.font = '10px monospace';
    ctx.fillText('GIRL', VIEW_W / 2 + 50, 225);

    ctx.font = '8px monospace';
    ctx.fillText('← → select, ENTER/A/B confirm', VIEW_W / 2, 300);
  } else if (charSelect.phase === 'build') {
    ctx.fillText('CHOOSE YOUR BUILD', VIEW_W / 2, 80);

    const builds = ['SHOOTER', 'ALLROUNDER', 'DEFENDER'];
    const buildDescs = [
      'Shooting++  Defense-',
      'Balanced stats',
      'Defense++  Drib-'
    ];

    builds.forEach((b, i) => {
      ctx.fillStyle = charSelect.build === i ? C.DARK : C.MID;
      ctx.fillRect(VIEW_W / 2 - 80, 110 + i * 70, 160, 55);
      ctx.fillStyle = C.DARKEST;
      ctx.font = '10px monospace';
      ctx.fillText(b, VIEW_W / 2, 130 + i * 70);
      ctx.font = '8px monospace';
      ctx.fillText(buildDescs[i], VIEW_W / 2, 145 + i * 70);
    });

    ctx.font = '8px monospace';
    ctx.fillText('↑ ↓ select, ENTER/A/B confirm', VIEW_W / 2, 340);
  }

  ctx.textAlign = 'left';
}

function drawCharPortrait(cx, cy, gender) {
  const px = cx - 10;
  const py = cy - 10;
  drawHoopsterSprite(px, py, {
    scale: 2,
    jersey: gender === 'boy' ? C.DARK : '#c06060',
    trim: gender === 'boy' ? C.LIGHT : '#ffd0d0',
    hair: gender === 'boy' ? '#4a3a1a' : '#2a1a0a',
    pants: gender === 'boy' ? '#2040a0' : '#402060',
    number: gender === 'boy' ? '3' : '8',
    ball: true,
    pose: 'dribble',
    headband: gender === 'girl' ? '#ffdfdf' : null,
  });
}

function updateCharSelect() {
  if (charSelect.phase === 'gender') {
    if (wasPressed('ArrowLeft') || wasPressed('ArrowRight')) {
      charSelect.gender = charSelect.gender === 0 ? 1 : 0;
    }
    if (wasConfirmPressed()) {
      charSelect.phase = 'build';
    }
  } else if (charSelect.phase === 'build') {
    if (wasPressed('ArrowUp')) {
      charSelect.build = (charSelect.build + 2) % 3;
    }
    if (wasPressed('ArrowDown')) {
      charSelect.build = (charSelect.build + 1) % 3;
    }
    if (wasConfirmPressed()) {
      applyCharacterCreation();
      startDialog('Welcome to Nordhorn!', 'Mom: Have a sweet time!');
    }
  }
}

function applyCharacterCreation() {
  SaveSystem.clear();
  resetRunProgress();
  player.gender = charSelect.gender === 0 ? 'boy' : 'girl';

  const buildNames = ['shooter', 'allrounder', 'defender'];
  const selectedBuild = buildNames[charSelect.build];
  player.build = selectedBuild;

  const bonus = BUILD_BONUS[selectedBuild];
  player.stats.dribbling = 5 + bonus.dribbling;
  player.stats.shooting = 5 + bonus.shooting;
  player.stats.athleticism = 5 + bonus.athleticism;
  player.stats.defense = 5 + bonus.defense;
  player.stats.courtVision = 5 + bonus.courtVision;

  player.hp = player.maxHp;
  player.energy = player.maxEnergy;
}

const PerfHUD = {
  last: performance.now(),
  frames: 0,
  fps: 0,

  tick(now) {
    this.frames++;
    if (now - this.last >= 500) {
      this.fps = Math.round((this.frames * 1000) / (now - this.last));
      this.frames = 0;
      this.last = now;
    }
  },

  render() {
    ctx.fillStyle = C.DARKEST;
    ctx.fillRect(4, VIEW_H - 18, 44, 12);
    ctx.fillStyle = C.LIGHT;
    ctx.font = '6px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('FPS ' + this.fps, 7, VIEW_H - 10);
  }
};

const ObjectiveTracker = {
  getNextTrainer() {
    return trainers.find(t => !t.beaten) || null;
  },

  getDistanceTo(trainer) {
    if (!trainer) return 0;
    return Math.abs(player.x - trainer.x) + Math.abs(player.y - trainer.y);
  },

  getArrowTo(trainer) {
    if (!trainer) return '✓';
    const dx = trainer.x - player.x;
    const dy = trainer.y - player.y;
    if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) return '!';
    if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? '→' : '←';
    return dy > 0 ? '↓' : '↑';
  },

  drawWorldMarker(camX, camY) {
    const next = this.getNextTrainer();
    if (!next) return;
    const px = (next.x - camX) * TILE;
    const py = (next.y - camY) * TILE;
    if (px < -TILE || px > VIEW_W || py < -TILE || py > VIEW_H) return;
    const pulse = Math.floor(Date.now() / 200) % 2;
    ctx.fillStyle = pulse ? '#ffffff' : '#d4600a';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('◆', px + 8, py - 12);
    ctx.textAlign = 'left';
  },

  drawMinimapMarker() {
    const next = this.getNextTrainer();
    if (!next) return;
    const mx = MINIMAP_X + next.x * MINIMAP_SCALE;
    const my = MINIMAP_Y + next.y * MINIMAP_SCALE;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx - 3, my - 3, 7, 7);
    ctx.beginPath();
    ctx.moveTo(MINIMAP_X + player.x * MINIMAP_SCALE, MINIMAP_Y + player.y * MINIMAP_SCALE);
    ctx.lineTo(mx, my);
    ctx.stroke();
  }
};

// Backwards-compatible alias for dormant legacy helper objects. Active rendering
// uses ObjectiveTracker directly so drawOverworld/drawBattle stay free of old
// Radar/Coach/Scout render calls.
const QuestRadar = ObjectiveTracker;

function drawOverworld() {
  const camX = Math.max(0, Math.min(MAP_W - VIEW_TILES_W / 1, player.x - Math.floor(VIEW_TILES_W / 2)));
  const camY = Math.max(0, Math.min(MAP_H - VIEW_TILES_H / 1, player.y - Math.floor(VIEW_TILES_H / 2)));

  // Draw tiles
  for (let y = Math.floor(camY) - 1; y < Math.ceil(camY) + VIEW_TILES_H + 1; y++) {
    for (let x = Math.floor(camX) - 1; x < Math.ceil(camX) + VIEW_TILES_W + 1; x++) {
      if (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) {
        drawTile(x, y, worldMap[y][x], camX, camY);
      }
    }
  }

  // Draw trainers
  trainers.forEach(t => {
    if (!t.beaten) drawTrainerSprite(t, camX, camY);
    else {
      // Draw beaten trainer faded
      const px = (t.x - camX) * TILE;
      const py = (t.y - camY) * TILE;
      ctx.globalAlpha = 0.5;
      drawTrainerSprite(t, camX, camY);
      ctx.globalAlpha = 1;
    }
  });

  // Draw player
  drawPlayer(camX, camY, player.facing, Math.floor(frameCount / 15) % 2);

  // Draw one small objective marker above the current trainer target.
  ObjectiveTracker.drawWorldMarker(camX, camY);

  // Draw minimap
  if (minimapVisible) drawMinimap();

  // Draw minimap hint
  ctx.font = '6px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = C.DARK;
  ctx.fillText('M: Map', VIEW_W - 10, VIEW_H - 6);
  ctx.textAlign = 'left';

  // Draw area labels
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = C.DARKEST;

  // Home label
  const homeLabelX = (6 - camX) * TILE;
  const homeLabelY = (2 - camY) * TILE;
  if (homeLabelX > 0 && homeLabelX < VIEW_W) {
    ctx.fillText('HOME', homeLabelX, homeLabelY);
  }

  // School label
  const schoolLabelX = (48 - camX) * TILE;
  const schoolLabelY = (3 - camY) * TILE;
  if (schoolLabelX > 0 && schoolLabelX < VIEW_W) {
    ctx.fillText('GYMNASIUM', schoolLabelX, schoolLabelY);
  }

  // Courts label
  const courtsLabelX = (16 - camX) * TILE;
  const courtsLabelY = (39 - camY) * TILE;
  if (courtsLabelX > 0 && courtsLabelX < VIEW_W) {
    ctx.fillText('COURTS', courtsLabelX, courtsLabelY);
  }

  // Library label
  const libLabelX = (38 - camX) * TILE;
  const libLabelY = (28 - camY) * TILE;
  if (libLabelX > 0 && libLabelX < VIEW_W) {
    ctx.fillText('LIBRARY', libLabelX, libLabelY);
  }

  // Stadium label
  const stadLabelX = (40 - camX) * TILE;
  const stadLabelY = (43 - camY) * TILE;
  if (stadLabelX > 0 && stadLabelX < VIEW_W) {
    ctx.fillText('STADIUM', stadLabelX, stadLabelY);
  }

  ctx.textAlign = 'left';

  // Minimal Gameboy HUD — keep the playfield clean.
  drawCleanOverworldHUD();
}

// ============================================================
// MINIMAP
// ============================================================

const MINIMAP_SCALE = 2; // pixels per tile
const MINIMAP_W = MAP_W * MINIMAP_SCALE; // 140
const MINIMAP_H = MAP_H * MINIMAP_SCALE; // 120
const MINIMAP_X = VIEW_W - MINIMAP_W - 8;
const MINIMAP_Y = 8;
const MINIMAP_BG = 'rgba(15, 56, 15, 0.85)';

// Tile colors for minimap (simplified)
const MINIMAP_COLORS = {
  [T.GRASS]: '#9bbc0f',
  [T.PATH]: '#8bac0f',
  [T.WATER]: '#306230',
  [T.TREE]: '#306230',
  [T.BUILD]: '#4a4a4a',
  [T.ROOF]: '#2a2a2a',
  [T.FENCE]: '#6b6b6b',
  [T.COURT]: '#5a5a3a',
  [T.DOOR]: '#0f380f',
  [T.FLOWER]: '#9bbc0f',
  [T.BENCH]: '#6b5b3b',
  [T.BRIDGE]: '#5a4a2a',
  [T.STADIUM]: '#4a4a4a',
  [T.WALL]: '#3a3a3a',
};

const MinimapCache = {
  canvas: null,
  ctx: null,
  dirty: true,

  ensure() {
    if (!this.canvas) {
      this.canvas = document.createElement('canvas');
      this.canvas.width = MINIMAP_W;
      this.canvas.height = MINIMAP_H;
      this.ctx = this.canvas.getContext('2d');
      this.ctx.imageSmoothingEnabled = false;
      this.dirty = true;
    }
    if (this.dirty) this.rebuild();
    return this.canvas;
  },

  rebuild() {
    if (!this.ctx) return;
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const tile = worldMap[y][x];
        this.ctx.fillStyle = MINIMAP_COLORS[tile] || C.LIGHT;
        this.ctx.fillRect(
          x * MINIMAP_SCALE,
          y * MINIMAP_SCALE,
          MINIMAP_SCALE,
          MINIMAP_SCALE
        );
      }
    }
    this.dirty = false;
  }
};

function drawMinimap() {
  // Border
  ctx.fillStyle = C.DARK;
  ctx.fillRect(MINIMAP_X - 2, MINIMAP_Y - 2, MINIMAP_W + 4, MINIMAP_H + 4);
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(MINIMAP_X - 1, MINIMAP_Y - 1, MINIMAP_W + 2, MINIMAP_H + 2);

  // Static tile layer is cached: 4,200 tiny fills become one drawImage per frame.
  ctx.globalAlpha = 0.92;
  ctx.drawImage(MinimapCache.ensure(), MINIMAP_X, MINIMAP_Y);
  ctx.globalAlpha = 1;

  // Draw trainers on minimap (as red dots)
  trainers.forEach(t => {
    const mx = MINIMAP_X + t.x * MINIMAP_SCALE;
    const my = MINIMAP_Y + t.y * MINIMAP_SCALE;
    ctx.fillStyle = t.beaten ? C.MID : '#ff4444';
    ctx.fillRect(mx - 1, my - 1, 3, 3);
  });

  // Highlight the next undefeated trainer so the core loop always has direction.
  ObjectiveTracker.drawMinimapMarker();

  // Draw player on minimmap (blinking white dot)
  const blink = Math.floor(Date.now() / 300) % 2;
  const px = MINIMAP_X + player.x * MINIMAP_SCALE;
  const py = MINIMAP_Y + player.y * MINIMAP_SCALE;
  ctx.fillStyle = blink ? '#ffffff' : C.DARK;
  ctx.fillRect(px - 1, py - 1, 3, 3);

  // Label
  ctx.fillStyle = C.DARKEST;
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MAP', MINIMAP_X + MINIMAP_W / 2, MINIMAP_Y + MINIMAP_H + 8);
  ctx.textAlign = 'left';
}

function isWalkable(x, y) {
  if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return false;
  const t = worldMap[y][x];
  return t === T.GRASS || t === T.PATH || t === T.COURT || t === T.FLOWER || t === T.BRIDGE || t === T.DOOR;
}

let minimapVisible = false;

function updateOverworld() {
  let dx = 0, dy = 0;
  player.moving = false;

  // Toggle minimap
  if (wasPressed('m') || wasPressed('M')) { minimapVisible = !minimapVisible; }
  if (wasPressed('r') || wasPressed('R')) { HomeRest.rest(); }

  if (keysPressed['ArrowLeft'] || keys['ArrowLeft']) { dx = -1; player.facing = 'left'; player.moving = true; }
  else if (keysPressed['ArrowRight'] || keys['ArrowRight']) { dx = 1; player.facing = 'right'; player.moving = true; }
  else if (keysPressed['ArrowUp'] || keys['ArrowUp']) { dy = -1; player.facing = 'up'; player.moving = true; }
  else if (keysPressed['ArrowDown'] || keys['ArrowDown']) { dy = 1; player.facing = 'down'; player.moving = true; }

  // Movement with frame-based timing
  if (frameCount % 6 === 0) {
    if (dx !== 0 || dy !== 0) {
      const nx = player.x + dx;
      const ny = player.y + dy;
      if (isWalkable(nx, ny)) {
        player.x = nx;
        player.y = ny;
        keysPressed['ArrowLeft'] = false;
        keysPressed['ArrowRight'] = false;
        keysPressed['ArrowUp'] = false;
        keysPressed['ArrowDown'] = false;

        // Check trainer encounter
        checkTrainerEncounter();
      }
    }
  }

  // Clear pressed keys each frame
  if (frameCount % 6 === 0) {
    keysPressed['ArrowLeft'] = false;
    keysPressed['ArrowRight'] = false;
    keysPressed['ArrowUp'] = false;
    keysPressed['ArrowDown'] = false;
  }
}

function checkTrainerEncounter() {
  for (let t of trainers) {
    if (!t.beaten && Math.abs(player.x - t.x) < 2 && Math.abs(player.y - t.y) < 2) {
      // Face the trainer
      if (player.x < t.x) player.facing = 'right';
      else if (player.x > t.x) player.facing = 'left';
      else if (player.y < t.y) player.facing = 'down';
      else player.facing = 'up';

      startDialog(t.dialogue, '', () => startBattle(t));
      gameState = 'DIALOG';
      return;
    }
  }
}

function drawBattle() {
  // Background - court
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // Court floor
  ctx.fillStyle = '#5a5a3a';
  ctx.fillRect(20, 20, VIEW_W - 40, VIEW_H - 100);

  // Court lines
  ctx.fillStyle = C.DARK;
  ctx.fillRect(20, 20, VIEW_W - 40, 2);
  ctx.fillRect(20, VIEW_H - 82, VIEW_W - 40, 2);
  ctx.fillRect(20, 20, 2, VIEW_H - 102);
  ctx.fillRect(VIEW_W - 22, 20, 2, VIEW_H - 102);

  // Half court line
  ctx.fillRect(VIEW_W / 2, 20, 2, VIEW_H - 102);

  // Classic court markings only: center circle and painted keys give the
  // battle floor more structure without adding any coach/advisor overlays.
  ctx.strokeStyle = C.DARK;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(VIEW_W / 2, 120, 28, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeRect(20, 82, 58, 76);
  ctx.strokeRect(VIEW_W - 78, 82, 58, 76);
  ctx.beginPath();
  ctx.arc(78, 120, 18, -Math.PI / 2, Math.PI / 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(VIEW_W - 78, 120, 18, Math.PI / 2, Math.PI * 1.5);
  ctx.stroke();

  // Three point arc
  ctx.fillRect(20, 60, 60, 2);
  ctx.fillRect(20, VIEW_H - 140, 60, 2);
  ctx.fillRect(VIEW_W - 80, 60, 60, 2);
  ctx.fillRect(VIEW_W - 80, VIEW_H - 140, 60, 2);

  // Pixel hoops/backboards are part of the court art, not extra HUD chrome.
  drawBattleHoop(28, 68, 'left');
  drawBattleHoop(VIEW_W - 44, 68, 'right');

  // Scoreboard
  ctx.fillStyle = C.DARK;
  ctx.fillRect(140, 22, 200, 30);
  ctx.fillStyle = C.LIGHT;
  ctx.fillRect(142, 24, 196, 26);
  ctx.fillStyle = C.DARKEST;

  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(battle.currentTrainer.name, 190, 38);
  ctx.fillText('YOU', 290, 38);
  ctx.fillText(String(battle.enemyScore), 190, 44);
  ctx.fillText(String(battle.playerScore), 290, 44);
  ctx.fillStyle = C.DARK;
  ctx.fillRect(200, 30, 2, 20);

  // Extra overlays intentionally disabled: the battle screen stays classic and readable.

  // Player side — fully above the command menu so the sprite, ball and label stay visible.
  drawBattlePlayer(76, 145);

  // Enemy side
  drawBattleEnemy(320, 80);

  // Ball
  if (battle.hasBall) {
    ctx.fillStyle = '#d4600a';
    ctx.beginPath();
    ctx.arc(104, 191, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else {
    ctx.fillStyle = '#d4600a';
    ctx.beginPath();
    ctx.arc(340, 100, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2a1a0a';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // HUD
  drawBattleHUD();

  // Dialog/messages
  drawDialog();

  // Move selection
  if (battle.phase === 'select' && battle.playerTurn) {
    drawMoveSelect();
  }

  ctx.textAlign = 'left';
}
